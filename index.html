<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>云鹤系统</title>
  <style>
    body { font-family: Arial; padding: 40px; background:#111; color:#fff; }
    .card { padding:20px; border:1px solid #333; margin-bottom:15px; border-radius:10px; }
    a { color:#fff; text-decoration:none; }
  </style>
</head>
<body>

<h1>内容列表</h1>
<div id="list"></div>

<script>
const SUPABASE_URL = "https://你的项目.supabase.co";
const API = SUPABASE_URL + "/rest/v1/contents?select=*&order=created_at.desc";

fetch(API)
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("list");

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h2><a href="content.html?slug=${item.slug}">${item.title}</a></h2>
        <p>${item.intro || ""}</p>
        <small>${item.type} / ${item.topic}</small>
      `;

      list.appendChild(div);
    });
  });
</script>

</body>
</html>
