<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>云鹤系统</title>

<style>
body{
  margin:0;
  background:#0d0d0d;
  color:#fff;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC";
}

/* 顶部栏 */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid #222;
}

header .logo{
  font-weight:700;
  letter-spacing:2px;
}

nav a{
  color:#aaa;
  margin-left:20px;
  text-decoration:none;
  font-size:14px;
}

/* 主体 */
.container{
  max-width:1100px;
  margin:0 auto;
  padding:80px 40px;
}

h1{
  font-size:56px;
  margin:0;
}

.sub{
  color:#aaa;
  margin-top:10px;
  font-size:16px;
}

/* 卡片 */
.grid{
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:20px;
  margin-top:60px;
}

.card{
  border:1px solid #222;
  padding:20px;
  border-radius:10px;
  transition:0.3s;
  cursor:pointer;
}

.card:hover{
  border-color:#555;
  transform:translateY(-3px);
}

.card h3{
  margin:0;
  font-size:22px;
}

.card p{
  color:#888;
  font-size:13px;
  margin-top:10px;
  line-height:1.5;
}

/* 响应式 */
@media(max-width:900px){
  .grid{grid-template-columns:1fr 1fr;}
}

@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
  h1{font-size:36px;}
}
</style>
</head>

<body>

<header>
  <div class="logo">YUNHE SYSTEM</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="video.html">视频</a>
    <a href="article-list.html">文章</a>
    <a href="case.html">案例</a>
    <a href="about.html">关于我</a>
  </nav>
</header>

<div class="container">

  <h1>云鹤系统</h1>
  <div class="sub">一个用于存放视频、文字、案例与现实判断的个人系统入口。</div>

  <div class="grid">

    <a class="card" href="video.html">
      <h3>视频</h3>
      <p>内容切片、表达记录、阶段性判断。</p>
    </a>

    <a class="card" href="article-list.html">
      <h3>文章</h3>
      <p>分析文本、方法论、观察记录。</p>
    </a>

    <a class="card" href="case.html">
      <h3>案例</h3>
      <p>平台、品牌、城市、消费与现实事件。</p>
    </a>

    <a class="card" href="about.html">
      <h3>关于我</h3>
      <p>身份、方法、边界与合作方式。</p>
    </a>

  </div>

</div>

</body>
</html>
