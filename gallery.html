          <div>
            <h2 id="detail-title"></h2>
            <p id="detail-description"></p>

          <div class="detail-side">
            <strong>上传日期</strong>
            <div id="detail-time">未标注</div>
            <br />

            <div id="detail-shot-time">未标注</div>
            <br />
            <strong>来源</strong>

        </div>
