<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内容发布后台｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/publish.css?v=20260716-3" />
  </head>

  <body>
    <header class="topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (window.history.length > 1) {
            event.preventDefault();
            window.history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="index.html">网站首页</a>
        <a href="admin.html">后台首页</a>
        <a href="publish.html">新建内容</a>
        <a href="video.html">视频</a>
        <a href="article.html">文章</a>
        <a href="case.html">案例</a>
      </nav>
    </header>

    <main class="home">
      <p class="eyebrow">PUBLISH</p>
      <h1>新建内容</h1>
      <p class="intro">选择内容类型与研究主题，发布后自动进入对应目录。</p>

      <section class="publish-panel">
        <div class="publish-row">
          <div>
            <label for="admin-name">管理员名称</label>
            <input id="admin-name" value="YUNHE" autocomplete="username" />
          </div>
          <div>
            <label for="password">管理员密码</label>
            <input id="password" type="password" autocomplete="current-password" />
          </div>
        </div>

        <div class="publish-row">
          <div>
            <label for="template">Content Template｜内容模板（不是文章分类）</label>
            <select id="template" required>
              <option value="" selected disabled>请选择模板</option>
              <option value="A">A｜Case Archive（案例库）</option>
              <option value="B">B｜Method Archive（方法库）</option>
              <option value="C">C｜Research Notes（研究记录）</option>
              <option value="D">D｜Project Archive（项目档案）</option>
              <option value="E">E｜Media Archive（媒体库）</option>
              <option value="X">X｜X Archive（未分类档案）</option>
            </select>
          </div>
          <div>
            <label for="knowledge-level">Knowledge Level（知识层级）</label>
            <select id="knowledge-level" required>
              <option value="" selected disabled>请选择知识层级</option>
              <option value="Observation">Observation（观察）</option>
              <option value="Analysis">Analysis（分析）</option>
              <option value="Decision">Decision（判断）</option>
              <option value="Validation">Validation（验证）</option>
              <option value="Method">Method（方法）</option>
            </select>
          </div>
        </div>

        <div class="publish-row">
          <div>
            <label for="type">内容类型</label>
            <select id="type">
              <option value="article">文章</option>
              <option value="video">视频</option>
              <option value="case">案例</option>
            </select>
          </div>
          <div>
            <label for="topic">首页文章分类｜选择具体类目</label>
            <select id="topic"></select>
            <button class="topic-reset" type="button" onclick="resetPublishTopic()">
              根据标题和正文判断分类
            </button>
          </div>
        </div>

        <label for="title">主标题</label>
        <input id="title" placeholder="例如：为什么成熟系统也会突然失效？" />

        <label for="subtitle">副标题</label>
        <input id="subtitle" placeholder="例如：我在亚朵连续几天观察到的运营细节" />

        <label for="intro">摘要 / 卡片说明</label>
        <textarea id="intro" placeholder="如果不填，列表会优先使用副标题。"></textarea>

        <div class="publish-row">
          <div>
            <label for="original-date">原始撰写时间</label>
            <input id="original-date" type="date" />
          </div>
          <div>
            <label for="source">内容来源</label>
            <select id="source">
              <option value="本站撰写">本站撰写</option>
              <option value="云鹤系统公众号转载">云鹤系统公众号转载</option>
              <option value="公众号导入">公众号导入</option>
              <option value="内部日记整理">内部日记整理</option>
              <option value="外部链接摘录">外部链接摘录</option>
            </select>
          </div>
        </div>

        <label for="video">视频链接 / 原始链接</label>
        <textarea id="video"></textarea>

        <label for="body">正文</label>
        <textarea id="body"></textarea>

        <section class="paid-settings">
          <p>PAID CONTENT｜付费内容</p>
          <h2>连接统一付款二维码</h2>
          <label class="paid-switch">
            <input id="paywall-enabled" type="checkbox" />
            开启这项内容的付费窗口
          </label>
          <label for="paywall-price">选择价格</label>
          <select id="paywall-price">
            <option value="9.9">¥9.9</option>
            <option value="19.9">¥19.9</option>
            <option value="29.9">¥29.9</option>
            <option value="59">¥59</option>
            <option value="99">¥99</option>
            <option value="199">¥199</option>
          </select>
          <a href="payment-settings.html" target="_blank">查看统一二维码设置</a>
        </section>

        <button onclick="publishToSite()">发布到网站</button>
      </section>

      <pre
        id="output"
        style="white-space: pre-wrap; background: #111; padding: 20px; margin-top: 30px"
      ></pre>
    </main>

    <script src="scripts/core/utils.js?v=20260716-3"></script>
    <script src="scripts/pages/publish.js?v=20260724-paywall-1"></script>

    <script src="scripts/core/knowledge-client.js?v=20260716-3"></script>
  </body>
</html>
