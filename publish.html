<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>内容发布后台｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE CMS</div>
  <nav>
    <a href="index.html">网站首页</a>
    <a href="admin.html">后台首页</a>
    <a href="publish.html">新建内容</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">PUBLISH</p>
<h1>新建内容</h1>
<p class="intro">选择内容类型与研究主题，发布后自动进入对应目录。</p>

<hr>

<p>管理员名称：</p>
<input id="admin-name" value="YUNHE" style="width:100%;height:44px;">

<p>管理员密码：</p>
<input id="password" type="password" style="width:100%;height:44px;">

<p>内容类型：</p>
<select id="type" style="width:100%;height:44px;">
  <option value="video">视频</option>
  <option value="article">文章</option>
  <option value="case">案例</option>
</select>

<p>研究主题：</p>
<select id="topic" style="width:100%;height:44px;">
  <option value="平台">平台</option>
  <option value="品牌">品牌</option>
  <option value="城市">城市</option>
  <option value="组织">组织</option>
  <option value="消费">消费</option>
  <option value="艺术">艺术</option>
  <option value="空间">空间</option>
  <option value="梦境">梦境</option>
</select>

<p>标题：</p>
<textarea id="title" style="width:100%;height:40px;"></textarea>

<p>一句简介：</p>
<textarea id="intro" style="width:100%;height:60px;"></textarea>

<p>视频链接 / 原始链接：</p>
<textarea id="video" style="width:100%;height:60px;"></textarea>

<p>正文：</p>
<textarea id="body" style="width:100%;height:220px;"></textarea>

<hr>

<button onclick="publishToSite()">发布到网站</button>

<pre id="output" style="white-space:pre-wrap;background:#111;padding:20px;margin-top:30px;"></pre>

</main>

<script>

async function publishToSite() {

  const adminName = document.getElementById("admin-name").value.trim();
  const password = document.getElementById("password").value.trim();
  const type = document.getElementById("type").value;
  const topic = document.getElementById("topic").value;
  const title = document.getElementById("title").value.trim();
  const intro = document.getElementById("intro").value.trim();
  const video = document.getElementById("video").value.trim();
  const body = document.getElementById("body").value.trim();
  const output = document.getElementById("output");

  if (!adminName || !password || !title || !body) {
    output.textContent = "必填项缺失：管理员名称 / 密码 / 标题 / 正文";
    return;
  }

  output.textContent = "正在发布...";

  try {
    const res = await fetch("/api/publish", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        adminName,
        password,
        title,
        intro,
        body,
        type,
        topic,
        video
      })
    });

    const data = await res.json().catch(() => ({}));

    if (res.ok) {
      output.textContent =
        "发布成功\n\n" +
        "标题：" + title + "\n" +
        "slug：" + data.slug + "\n" +
        "访问链接：" + data.url;

      alert("发布成功");
    } else {
      output.textContent =
        "发布失败：\n" + (data.error || JSON.stringify(data, null, 2));
    }

  } catch (err) {
    output.textContent =
      "请求失败：\n" + err.message;
  }
}

</script>

</body>
</html>
