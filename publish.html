<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<title>内容发布器｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
    <a href="about.html">关于我</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">PUBLISH SYSTEM</p>

<h1>内容发布器（模板系统）</h1>

<p class="intro">
在这里填写内容，然后复制生成页面
</p>

<hr>

<h2>基础信息</h2>

<p>标题：</p>
<textarea id="title" style="width:100%;height:40px;"></textarea>

<p>一句简介：</p>
<textarea id="intro" style="width:100%;height:60px;"></textarea>

<p>视频链接（可选）：</p>
<textarea id="video" style="width:100%;height:60px;"></textarea>

<p>正文：</p>
<textarea id="body" style="width:100%;height:120px;"></textarea>

<p>主题分类：</p>
<textarea id="tag" style="width:100%;height:40px;"></textarea>

<hr>

<button onclick="generate()">生成内容页代码</button>

<h2>生成结果（复制到GitHub）</h2>

<pre id="output" style="white-space:pre-wrap;background:#111;padding:10px;"></pre>

</main>

<script>
function generate(){
  const title = document.getElementById('title').value;
  const intro = document.getElementById('intro').value;
  const video = document.getElementById('video').value;
  const body = document.getElementById('body').value;
  const tag = document.getElementById('tag').value;

  const html = `
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>${title}</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
    <a href="about.html">关于我</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">${tag}</p>

<h1>${title}</h1>

<p class="intro">${intro}</p>

<hr>

<h2>视频</h2>
<p>${video}</p>

<hr>

<h2>正文</h2>
<p>${body}</p>

<hr>

<h2>返回</h2>
<div class="grid">
<a class="card" href="index.html">回首页</a>
</div>

</main>

</body>
</html>
`;

 const blob = new Blob([html], {type: "text/html"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = title + ".html";
a.click();

document.getElementById('output').textContent = html;
}
</script>

</body>
</html>
