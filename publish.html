<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>内容发布器｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
    <a href="about.html">关于我</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">PUBLISH SYSTEM</p>
<h1>内容发布器</h1>
<p class="intro">填写内容后，直接发布到网站。</p>

<hr>

<h2>发布权限</h2>

<p>发布密码：</p>
<textarea id="password" style="width:100%;height:40px;"></textarea>

<hr>

<h2>基础信息</h2>

<p>标题：</p>
<textarea id="title" style="width:100%;height:40px;"></textarea>

<p>一句简介：</p>
<textarea id="intro" style="width:100%;height:60px;"></textarea>

<p>视频链接（可选）：</p>
<textarea id="video" style="width:100%;height:60px;"></textarea>

<p>正文：</p>
<textarea id="body" style="width:100%;height:160px;"></textarea>

<p>主题分类：</p>
<textarea id="tag" style="width:100%;height:40px;"></textarea>

<hr>

<button onclick="publishToSite()">发布到网站</button>

<pre id="output" style="white-space:pre-wrap;background:#111;padding:10px;margin-top:30px;"></pre>

</main>

<script>
async function publishToSite() {
  const password = document.getElementById("password").value;
  const title = document.getElementById("title").value;
  const intro = document.getElementById("intro").value;
  const video = document.getElementById("video").value;
  const body = document.getElementById("body").value;
  const tag = document.getElementById("tag").value;

  const res = await fetch("/api/publish", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ password, title, intro, video, body, tag })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("output").textContent =
      "发布成功！文件名：" + data.filename;
    alert("发布成功：" + data.filename);
  } else {
    document.getElementById("output").textContent =
      "发布失败：" + JSON.stringify(data, null, 2);
    alert("发布失败，请看页面底部错误信息");
  }
}
</script>

</body>
</html>
