<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>内容发布后台｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
    <a href="about.html">关于我</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">YUNHENODE CMS</p>
<h1>内容发布后台</h1>
<p class="intro">发布视频、文章、案例，并自动进入内容目录。</p>

<hr>

<p>发布密码：</p>
<textarea id="password" style="width:100%;height:40px;"></textarea>

<p>内容类型：</p>
<select id="type" style="width:100%;height:44px;">
  <option value="video">视频</option>
  <option value="article">文章</option>
  <option value="case">案例</option>
</select>

<p>研究主题：</p>
<select id="topic" style="width:100%;height:44px;">
  <option value="平台">平台</option>
  <option value="品牌">品牌</option>
  <option value="城市">城市</option>
  <option value="组织">组织</option>
  <option value="消费">消费</option>
  <option value="艺术">艺术</option>
  <option value="空间">空间</option>
  <option value="梦境">梦境</option>
</select>

<p>标题：</p>
<textarea id="title" style="width:100%;height:40px;"></textarea>

<p>一句简介：</p>
<textarea id="intro" style="width:100%;height:60px;"></textarea>

<p>视频链接 / 原始链接：</p>
<textarea id="video" style="width:100%;height:60px;"></textarea>

<p>正文：</p>
<textarea id="body" style="width:100%;height:180px;"></textarea>

<hr>

<button onclick="publishToSite()">发布到网站</button>

<pre id="output" style="white-space:pre-wrap;background:#111;padding:20px;margin-top:30px;"></pre>

</main>

<script>
async function publishToSite() {
  const password = document.getElementById("password").value;
  const type = document.getElementById("type").value;
  const topic = document.getElementById("topic").value;
  const title = document.getElementById("title").value;
  const intro = document.getElementById("intro").value;
  const video = document.getElementById("video").value;
  const body = document.getElementById("body").value;

  const output = document.getElementById("output");
  output.textContent = "正在发布，请稍等...";

  const res = await fetch("/api/publish", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      password,
      type,
      topic,
      title,
      intro,
      video,
      body
    })
  });

  const data = await res.json();

  if (data.success) {
    output.innerHTML =
      "发布成功！\\n文件名：" + data.filename + "\\n访问地址：" + data.url;
    alert("发布成功！");
  } else {
    output.textContent = "发布失败：\\n" + JSON.stringify(data, null, 2);
    alert("发布失败，看页面底部错误信息");
  }
}
</script>

</body>
</html>
