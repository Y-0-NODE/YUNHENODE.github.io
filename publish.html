<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>内容发布后台｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE CMS</div>
  <nav>
    <a href="index.html">网站首页</a>
    <a href="admin.html">后台首页</a>
    <a href="publish.html">新建内容</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">PUBLISH</p>
<h1>新建内容</h1>
<p class="intro">选择内容类型与研究主题，发布后自动进入对应目录。</p>

<hr>

<p>发布密码：</p>
<textarea id="password" style="width:100%;height:40px;"></textarea>

<p>内容类型：</p>
<select id="type" style="width:100%;height:44px;">
  <option value="video">视频</option>
  <option value="article">文章</option>
  <option value="case">案例</option>
</select>

<p>研究主题：</p>
<select id="topic" style="width:100%;height:44px;">
  <option value="平台">平台</option>
  <option value="品牌">品牌</option>
  <option value="城市">城市</option>
  <option value="组织">组织</option>
  <option value="消费">消费</option>
  <option value="艺术">艺术</option>
  <option value="空间">空间</option>
  <option value="梦境">梦境</option>
</select>

<p>标题：</p>
<textarea id="title" style="width:100%;height:40px;"></textarea>

<p>一句简介：</p>
<textarea id="intro" style="width:100%;height:60px;"></textarea>

<p>视频链接 / 原始链接：</p>
<textarea id="video" style="width:100%;height:60px;"></textarea>

<p>正文：</p>
<textarea id="body" style="width:100%;height:220px;"></textarea>

<hr>

<button onclick="publishToSite()">发布到网站</button>

<pre id="output" style="white-space:pre-wrap;background:#111;padding:20px;margin-top:30px;"></pre>

</main>

<script>

const SUPABASE_URL = "https://ndraugyrdnecqqcyfzjt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM";

/* =========================
   发布函数（升级版）
========================= */
async function publishToSite() {

  const password = document.getElementById("password").value.trim();
  const type = document.getElementById("type").value;
  const topic = document.getElementById("topic").value;
  const title = document.getElementById("title").value.trim();
  const intro = document.getElementById("intro").value.trim();
  const video = document.getElementById("video").value.trim();
  const body = document.getElementById("body").value.trim();
  const output = document.getElementById("output");

  if (!password || !title || !body) {
    output.textContent = "❌ 必填项缺失：密码 / 标题 / 正文";
    return;
  }

  output.textContent = "🚀 正在发布...";

  /* =========================
     1️⃣ 自动生成 slug（关键）
  ========================= */
  const slug =
    title
      .toLowerCase()
      .replace(/\s+/g, "-")
      .replace(/[^\w\u4e00-\u9fa5-]/g, "") +
    "-" +
    Date.now();

  /* =========================
     2️⃣ 请求 Supabase
  ========================= */
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/contents`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        Prefer: "return=representation"
      },
      body: JSON.stringify({
        title,
        intro,
        body,
        video,
        type,
        topic,
        slug,
        created_at: new Date().toISOString()
      })
    });

    const data = await res.json();

    /* =========================
       3️⃣ 成功返回
    ========================= */
    if (res.ok) {
      output.textContent =
        "✅ 发布成功\n\n" +
        "标题：" + title + "\n" +
        "slug：" + slug + "\n" +
        "访问链接：content.html?slug=" + slug;

      alert("发布成功");
    } else {
      output.textContent =
        "❌ 发布失败：\n" + JSON.stringify(data, null, 2);
    }

  } catch (err) {
    output.textContent =
      "❌ 请求失败：\n" + err.message;
  }
}

</script>

</body>
</html>
