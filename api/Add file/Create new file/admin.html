<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>YUNHENODE CMS｜后台</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE CMS</div>
  <nav>
    <a href="index.html">网站首页</a>
    <a href="admin.html">后台首页</a>
    <a href="publish.html">新建内容</a>
    <a href="video.html">内容列表</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">DASHBOARD</p>
<h1>后台首页</h1>
<p class="intro">这里是云鹤系统的内容管理入口。</p>

<div class="grid">

  <a class="card" href="publish.html">
    <span>CREATE</span>
    <h2>新建内容</h2>
    <p>发布视频、文章、案例。</p>
  </a>

  <a class="card" href="video.html">
    <span>CONTENT</span>
    <h2>全部内容</h2>
    <p>查看已经发布的内容。</p>
  </a>

  <a class="card" href="content-list.json">
    <span>DATABASE</span>
    <h2>内容数据库</h2>
    <p>查看当前内容数据。</p>
  </a>

  <a class="card" href="index.html">
    <span>SITE</span>
    <h2>返回网站</h2>
    <p>查看前台页面。</p>
  </a>

</div>

<hr>

<h2>最近发布内容</h2>

<div id="list"></div>

</main>

<script>
async function loadList() {

  const res = await fetch("content-list.json");
  const data = await res.json();

  const box = document.getElementById("list");

  if (!data.length) {
    box.innerHTML = "<p>暂无内容</p>";
    return;
  }

  box.innerHTML = data.slice(0, 5).map(item => `
    <div class="card" style="margin-bottom:15px;">
      <span>${item.tag || item.topic || "CONTENT"}</span>
      <h2>${item.title}</h2>
      <p>${item.intro}</p>
      <a href="${item.url}">打开内容 →</a>
    </div>
  `).join("");

}

loadList();
</script>

</body>
</html>
