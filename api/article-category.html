<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>文章分类｜云鹤系统</title><link rel="stylesheet" href="style.css"></head>
<body>
<header class="topbar"><div class="logo">YUNHENODE</div><nav><a href="article.html">返回文章</a><a href="admin.html">后台</a></nav></header>
<main class="home">
<p class="eyebrow">ARTICLE / CATEGORY</p>
<h1>文章分类</h1>
<p class="intro">按研究主题查看文章。</p>
<div id="category-list" class="grid"></div>
</main>
<script>
const topics = ["品牌","平台","城市","组织","消费","艺术","空间","梦境"];
async function loadCategories(){
  const res = await fetch("content-list.json");
  const data = await res.json();
  const articles = data.filter(item => item.type === "article");
  const box = document.getElementById("category-list");
  box.innerHTML = topics.map(topic => {
    const count = articles.filter(item => item.topic === topic || item.tag === topic).length;
    return `
      <div class="card">
        <span>${count} 篇</span>
        <h2>${topic}</h2>
        <p>${topic}相关文章。</p>
      </div>
    `;
  }).join("");
}
loadCategories();
</script>
</body>
</html>
