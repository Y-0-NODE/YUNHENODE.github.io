<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公众号导入｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/wechat-import.css" />
  </head>

  <body>
    <header class="topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (window.history.length > 1) {
            event.preventDefault();
            window.history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="admin.html">后台首页</a>
        <a href="article-list.html">文章列表</a>
        <a href="case-list.html">案例列表</a>
        <a href="video-list.html">视频列表</a>
      </nav>
    </header>

    <main class="home">
      <p class="eyebrow">WECHAT IMPORT</p>
      <h1>公众号导入</h1>
      <p class="intro">复制公众号内容，自动匹配网站板块和主题分类，再保存到网站数据库。</p>

      <section class="workspace">
        <form
          class="panel"
          onsubmit="
            event.preventDefault();
            publishImport();
          "
        >
          <div class="row">
            <div>
              <label for="admin-name">管理员名称</label>
              <input id="admin-name" value="YUNHE" autocomplete="username" />
            </div>
            <div>
              <label for="admin-password">管理员密码</label>
              <input id="admin-password" type="password" autocomplete="current-password" />
            </div>
          </div>

          <label for="source-url">公众号原文链接</label>
          <input id="source-url" placeholder="https://mp.weixin.qq.com/s/..." />

          <label for="raw">粘贴公众号内容</label>
          <textarea
            id="raw"
            oninput="autoFill()"
            placeholder="把公众号文章标题、摘要、正文复制到这里。第一行通常会被识别为标题。"
          ></textarea>

          <div class="row">
            <div>
              <label for="type">网站板块</label>
              <select id="type" onchange="renderPreview()">
                <option value="auto">自动判断</option>
                <option value="article">文章</option>
                <option value="case">案例</option>
                <option value="video">视频</option>
              </select>
            </div>
            <div>
              <label for="topic">主题分类</label>
              <select id="topic" onchange="renderPreview()">
                <option value="auto">自动判断</option>
                <optgroup label="原有分类（全部保留）">
                  <option value="平台">平台</option>
                  <option value="品牌">品牌</option>
                  <option value="城市">城市</option>
                  <option value="组织">组织</option>
                  <option value="消费">消费</option>
                  <option value="艺术">艺术</option>
                  <option value="空间">空间</option>
                  <option value="技术">技术</option>
                  <option value="梦境">梦境</option>
                </optgroup>
                <optgroup label="人与关系">
                  <option value="情感与关系">情感与关系</option>
                  <option value="亲密关系与家庭">亲密关系与家庭</option>
                  <option value="沟通与冲突">沟通与冲突</option>
                  <option value="个体成长">个体成长</option>
                </optgroup>
                <optgroup label="组织与系统">
                  <option value="组织结构">组织结构</option>
                  <option value="系统机制">系统机制</option>
                  <option value="管理与协作">管理与协作</option>
                  <option value="平台与技术">平台与技术</option>
                </optgroup>
                <optgroup label="社会与现实">
                  <option value="社会观察">社会观察</option>
                  <option value="城市与空间">城市与空间</option>
                  <option value="消费与生活">消费与生活</option>
                  <option value="商业与品牌">商业与品牌</option>
                </optgroup>
                <optgroup label="创作与内在">
                  <option value="艺术与创作">艺术与创作</option>
                  <option value="方法与思考">方法与思考</option>
                  <option value="梦境与潜意识">梦境与潜意识</option>
                </optgroup>
                <optgroup label="协议补充分类">
                  <option value="文化">Culture（文化）</option>
                  <option value="社会">Society（社会）</option>
                  <option value="未分类">Unknown（未分类）</option>
                </optgroup>
              </select>
            </div>
          </div>

          <label for="title">标题</label>
          <input id="title" oninput="renderPreview()" />

          <label for="intro">一句简介</label>
          <textarea id="intro" oninput="renderPreview()"></textarea>

          <label for="media-url">图片 / 视频地址</label>
          <input
            id="media-url"
            oninput="renderPreview()"
            placeholder="可选。视频文章可以粘贴视频地址，图片也可以作为正文媒体插入。"
          />

          <label for="body">整理后的正文</label>
          <textarea id="body" oninput="renderPreview()"></textarea>

          <div class="actions">
            <button class="primary" type="submit">保存到网站数据库</button>
            <button type="button" onclick="autoFill(true)">重新自动整理</button>
            <button type="button" onclick="copyPreview()">复制整理文本</button>
            <a href="admin.html">返回后台</a>
          </div>

          <div id="status" class="status"></div>
        </form>

        <article class="preview">
          <p class="eyebrow">IMPORT PREVIEW</p>
          <h2>导入预览</h2>
          <pre id="preview">粘贴公众号内容后，这里会出现整理结果。</pre>
        </article>
      </section>
    </main>

    <script src="scripts/pages/wechat-import.js"></script>
    <script src="scripts/core/knowledge-client.js"></script>
  </body>
</html>
