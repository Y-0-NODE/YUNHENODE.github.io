<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公众号导入｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/wechat-import.css?v=20260716-3" />
  </head>

  <body>
    <header class="topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (window.history.length > 1) {
            event.preventDefault();
            window.history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="admin.html">后台首页</a>
        <a href="article-list.html">文章列表</a>
        <a href="case-list.html">案例列表</a>
        <a href="video-list.html">视频列表</a>
      </nav>
    </header>

    <main class="home">
      <p class="eyebrow">WECHAT IMPORT</p>
      <h1>公众号导入</h1>
      <p class="intro">复制公众号内容，自动匹配网站板块和主题分类，再保存到网站数据库。</p>

      <section class="workspace">
        <form
          class="panel"
          onsubmit="
            event.preventDefault();
            publishImport();
          "
        >
          <div class="row">
            <div>
              <label for="admin-name">管理员名称</label>
              <input id="admin-name" value="YUNHE" autocomplete="username" />
            </div>
            <div>
              <label for="admin-password">管理员密码</label>
              <input id="admin-password" type="password" autocomplete="current-password" />
            </div>
          </div>

          <div class="row">
            <div>
              <label for="template">Content Template｜内容模板（不是文章分类）</label>
              <select id="template" onchange="renderPreview()">
                <option value="A">A｜Case Archive（案例库）</option>
                <option value="B">B｜Method Archive（方法库）</option>
                <option value="C" selected>C｜Research Notes（研究记录）</option>
                <option value="D">D｜Project Archive（项目档案）</option>
                <option value="E">E｜Media Archive（媒体库）</option>
                <option value="X">X｜X Archive（未分类档案）</option>
              </select>
            </div>
            <div>
              <label for="knowledge-level">Knowledge Level（知识层级）</label>
              <select id="knowledge-level" onchange="renderPreview()">
                <option value="Observation">Observation（观察）</option>
                <option value="Analysis" selected>Analysis（分析）</option>
                <option value="Decision">Decision（判断）</option>
                <option value="Validation">Validation（验证）</option>
                <option value="Method">Method（方法）</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div>
              <label for="original-date">原始撰写时间</label>
              <input id="original-date" type="date" onchange="renderPreview()" />
            </div>
            <div>
              <label for="source">内容来源</label>
              <select id="source" onchange="renderPreview()">
                <option value="公众号导入" selected>公众号导入</option>
                <option value="云鹤系统公众号转载">云鹤系统公众号转载</option>
                <option value="本站撰写">本站撰写</option>
                <option value="内部日记整理">内部日记整理</option>
                <option value="外部链接摘录">外部链接摘录</option>
              </select>
            </div>
          </div>

          <label for="source-url">公众号原文链接</label>
          <input id="source-url" placeholder="https://mp.weixin.qq.com/s/..." />

          <label for="raw">粘贴公众号内容</label>
          <textarea
            id="raw"
            oninput="autoFill()"
            placeholder="把公众号文章标题、摘要、正文复制到这里。第一行通常会被识别为标题。"
          ></textarea>

          <div class="row">
            <div>
              <label for="type">网站板块</label>
              <select id="type" onchange="renderPreview()">
                <option value="auto">自动判断</option>
                <option value="article">文章</option>
                <option value="case">案例</option>
                <option value="video">视频</option>
              </select>
            </div>
            <div>
              <label for="topic">首页文章分类｜选择具体类目</label>
              <select id="topic" onchange="renderPreview()"></select>
            </div>
          </div>

          <label for="title">标题</label>
          <input id="title" oninput="renderPreview()" />

          <label for="intro">一句简介</label>
          <textarea id="intro" oninput="renderPreview()"></textarea>

          <label for="media-url">图片 / 视频地址</label>
          <input
            id="media-url"
            oninput="renderPreview()"
            placeholder="可选。视频文章可以粘贴视频地址，图片也可以作为正文媒体插入。"
          />

          <label for="body">整理后的正文</label>
          <textarea id="body" oninput="renderPreview()"></textarea>

          <div class="actions">
            <button class="primary" type="submit">保存到网站数据库</button>
            <button type="button" onclick="autoFill(true)">重新自动整理</button>
            <button type="button" onclick="copyPreview()">复制整理文本</button>
            <a href="admin.html">返回后台</a>
          </div>

          <div id="status" class="status"></div>
        </form>

        <article class="preview">
          <p class="eyebrow">IMPORT PREVIEW</p>
          <h2>导入预览</h2>
          <pre id="preview">粘贴公众号内容后，这里会出现整理结果。</pre>
        </article>
      </section>
    </main>

    <script src="scripts/core/utils.js?v=20260716-3"></script>
    <script src="scripts/pages/wechat-import.js?v=20260716-3"></script>
    <script src="scripts/core/knowledge-client.js?v=20260716-3"></script>
  </body>
</html>
