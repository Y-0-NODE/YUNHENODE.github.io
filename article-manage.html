<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章管理｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.login-panel,
.manage-item,
.editor-panel,
.tool-panel{
  border:1px solid #2a2a2a;
  background:#111;
  padding:22px;
}

.login-panel{
  margin-top:36px;
  max-width:520px;
}

.login-panel label{
  display:block;
  color:#aaa;
  margin:16px 0 10px;
}

.login-panel input{
  width:100%;
  border:1px solid #2a2a2a;
  background:#0b0b0b;
  color:#f2f2f2;
  padding:12px;
}

.tool-panel{
  margin-top:28px;
}

.tool-panel input{
  width:100%;
  border:1px solid #2a2a2a;
  background:#0b0b0b;
  color:#f2f2f2;
  padding:12px;
}

.login-panel button,
.actions a,
.actions button,
.editor-actions button{
  border:1px solid #2a2a2a;
  background:#0b0b0b;
  color:#ddd;
  padding:10px 14px;
  text-decoration:none;
  cursor:pointer;
  font-size:14px;
}

.login-panel button{
  margin-top:18px;
  width:100%;
  max-width:420px;
  background:#f2f2f2;
  color:#0b0b0b;
  font-weight:700;
}

.login-panel button:hover,
.actions a:hover,
.actions button:hover,
.editor-actions button:hover{
  background:#dcdcdc;
}

.manage-list{
  display:grid;
  gap:14px;
  margin-top:40px;
}

.manage-item h2{
  font-size:24px;
  margin:10px 0 12px;
}

.meta{
  color:#777;
  font-size:14px;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}

.actions .danger{
  color:#ff9a9a;
  border-color:#4a2525;
}

.status{
  color:#888;
  margin-top:28px;
  line-height:1.7;
}

.editor-panel{
  margin-top:32px;
}

.editor-panel label{
  display:block;
  color:#aaa;
  margin:16px 0 8px;
}

.editor-panel input,
.editor-panel select,
.editor-panel textarea{
  width:100%;
  border:1px solid #2a2a2a;
  background:#0b0b0b;
  color:#f2f2f2;
  padding:12px;
}

.editor-panel textarea{
  min-height:160px;
  resize:vertical;
}

.editor-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="article.html">文章</a>
    <a href="article-list.html">文章列表</a>
    <a href="publish.html">新建内容</a>
  </nav>
</header>

<main class="home">
  <p class="eyebrow">ARTICLE MANAGEMENT</p>
  <h1>文章管理</h1>
  <p class="intro">先登录数据管理员账户，再管理和删除文章。</p>

  <section id="login-panel" class="login-panel">
    <label for="admin-name">数据管理员名称</label>
    <input id="admin-name" type="text" autocomplete="username" placeholder="填写你的环境变量名称，例如 YUNHE">

    <label for="admin-password">数据管理员密码</label>
    <input id="admin-password" type="password" autocomplete="current-password" placeholder="填写这个环境变量对应的密码">

    <button type="button" onclick="login()">登录管理后台</button>
    <div id="login-status" class="status"></div>
  </section>

  <section id="manager-panel" class="hidden">
    <div class="tool-panel">
      <input id="search" type="search" placeholder="搜索标题、简介、主题" oninput="applySearch()">
    </div>

    <section id="editor-panel" class="editor-panel hidden">
      <p class="eyebrow">EDIT ARTICLE</p>
      <h2 id="editor-heading">编辑文章</h2>

      <label for="edit-title">标题</label>
      <input id="edit-title" type="text">

      <label for="edit-intro">简介</label>
      <textarea id="edit-intro"></textarea>

      <label for="edit-topic">主题</label>
      <select id="edit-topic">
        <option value="平台">平台</option>
        <option value="品牌">品牌</option>
        <option value="城市">城市</option>
        <option value="组织">组织</option>
        <option value="消费">消费</option>
        <option value="艺术">艺术</option>
        <option value="空间">空间</option>
        <option value="梦境">梦境</option>
        <option value="未分类">未分类</option>
      </select>

      <label for="edit-body">正文</label>
      <textarea id="edit-body"></textarea>

      <div class="editor-actions">
        <button type="button" onclick="saveEdit()">保存修改</button>
        <button type="button" onclick="closeEditor()">取消</button>
      </div>
    </section>

    <div id="status" class="status">正在加载文章...</div>
    <div id="list" class="manage-list"></div>
  </section>
</main>

<script>
let DATA = [];
let ADMIN_NAME = "";
let ADMIN_PASSWORD = "";
let EDITING_ID = "";

function articleUrl(item){
  if(item.slug) return `content.html?slug=${encodeURIComponent(item.slug)}`;
  return `content.html?id=${encodeURIComponent(item.id)}`;
}

function render(list){
  const box = document.getElementById("list");
  const status = document.getElementById("status");
  box.innerHTML = "";

  if(!list.length){
    status.textContent = "暂时没有文章。";
    return;
  }

  status.textContent = "";
  box.innerHTML = list.map(item => `
    <div class="manage-item">
      <div class="meta">${item.topic || "未分类"} / ${item.type || "article"} / ID ${item.id}</div>
      <h2>${item.title || "未命名文章"}</h2>
      <p>${item.intro || ""}</p>
      <div class="actions">
        <a href="${articleUrl(item)}">打开文章</a>
        <button type="button" onclick="openEditor('${item.id}')">编辑文章</button>
        <button class="danger" type="button" onclick="deleteArticle('${item.id}', '${encodeURIComponent(item.slug || "")}', '${encodeURIComponent(item.title || "")}')">删除文章</button>
      </div>
    </div>
  `).join("");
}

function applySearch(){
  const q = document.getElementById("search").value.trim().toLowerCase();

  if(!q){
    render(DATA);
    return;
  }

  render(DATA.filter(item => {
    return [
      item.title,
      item.intro,
      item.topic,
      item.type,
      item.slug
    ].some(value => String(value || "").toLowerCase().includes(q));
  }));
}

async function login(){
  ADMIN_NAME = document.getElementById("admin-name").value.trim();
  ADMIN_PASSWORD = document.getElementById("admin-password").value.trim();

  if(!ADMIN_NAME){
    alert("请填写数据管理员名称。例如：YUNHE");
    document.getElementById("admin-name").focus();
    return;
  }

  if(!ADMIN_PASSWORD){
    alert("请填写数据管理员密码。");
    document.getElementById("admin-password").focus();
    return;
  }

  document.getElementById("status").textContent = "正在登录...";
  document.getElementById("login-status").textContent = "正在登录...";
  document.getElementById("manager-panel").classList.remove("hidden");

  const res = await fetch("/api/admin-list", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      adminName: ADMIN_NAME,
      password: ADMIN_PASSWORD
    })
  });

  const result = await res.json().catch(() => ({}));

  if(!res.ok){
    document.getElementById("manager-panel").classList.add("hidden");
    const message = result.error || "登录失败，请检查 Vercel 环境变量名称和密码。";
    document.getElementById("login-status").textContent = message;
    alert(message);
    return;
  }

  document.getElementById("login-panel").classList.add("hidden");
  document.getElementById("login-status").textContent = "";
  DATA = Array.isArray(result.data) ? result.data : [];
  render(DATA);
}

async function reloadArticles(){
  const res = await fetch("/api/admin-list", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      adminName: ADMIN_NAME,
      password: ADMIN_PASSWORD
    })
  });

  const result = await res.json().catch(() => ({}));

  if(res.ok){
    DATA = Array.isArray(result.data) ? result.data : [];
    applySearch();
  }
}

function openEditor(id){
  const item = DATA.find(row => String(row.id) === String(id));

  if(!item){
    alert("没有找到这篇文章，请刷新管理页。");
    return;
  }

  EDITING_ID = String(item.id);
  document.getElementById("editor-heading").textContent = `编辑文章：${item.title || "未命名文章"}`;
  document.getElementById("edit-title").value = item.title || "";
  document.getElementById("edit-intro").value = item.intro || "";
  document.getElementById("edit-topic").value = item.topic || "未分类";
  document.getElementById("edit-body").value = item.body || "";
  document.getElementById("editor-panel").classList.remove("hidden");
  document.getElementById("editor-panel").scrollIntoView({ behavior:"smooth", block:"start" });
}

function closeEditor(){
  EDITING_ID = "";
  document.getElementById("editor-panel").classList.add("hidden");
}

async function saveEdit(){
  if(!EDITING_ID){
    alert("没有正在编辑的文章。");
    return;
  }

  const payload = {
    id: EDITING_ID,
    title: document.getElementById("edit-title").value.trim(),
    intro: document.getElementById("edit-intro").value.trim(),
    topic: document.getElementById("edit-topic").value,
    body: document.getElementById("edit-body").value.trim(),
    adminName: ADMIN_NAME,
    password: ADMIN_PASSWORD
  };

  if(!payload.title || !payload.body){
    alert("标题和正文不能为空。");
    return;
  }

  const res = await fetch("/api/update", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify(payload)
  });

  const result = await res.json().catch(() => ({}));

  if(!res.ok){
    alert(result.error || "保存失败，请检查接口或环境变量。");
    return;
  }

  alert("已保存");
  closeEditor();
  await reloadArticles();
}

async function deleteArticle(id, encodedSlug, encodedTitle){
  const slug = decodeURIComponent(encodedSlug || "");
  const title = decodeURIComponent(encodedTitle || "");
  const name = title || slug || `ID ${id}`;
  const ok = confirm(`确定删除「${name}」吗？删除后不能在网站里恢复。`);

  if(!ok) return;

  const res = await fetch("/api/delete", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      id,
      slug,
      title,
      adminName: ADMIN_NAME,
      password: ADMIN_PASSWORD
    })
  });

  const result = await res.json().catch(() => ({}));

  if(!res.ok){
    alert(result.error || "删除失败，请检查 Vercel 环境变量和 Supabase 权限。");
    return;
  }

  alert(`已删除：${result.deleted?.title || name}`);
  DATA = DATA.filter(item => String(item.id) !== String(id));
  render(DATA);
  reloadArticles();
}
</script>

</body>
</html>
