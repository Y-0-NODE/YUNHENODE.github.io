<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章管理｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.manage-list{
  display:grid;
  gap:14px;
  margin-top:40px;
}

.manage-item{
  border:1px solid #2a2a2a;
  background:#111;
  padding:22px;
}

.manage-item h2{
  font-size:24px;
  margin:10px 0 12px;
}

.meta{
  color:#777;
  font-size:14px;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}

.actions a,
.actions button{
  border:1px solid #2a2a2a;
  background:#0b0b0b;
  color:#ddd;
  padding:10px 14px;
  text-decoration:none;
  cursor:pointer;
  font-size:14px;
}

.actions a:hover,
.actions button:hover{
  background:#181818;
}

.actions .danger{
  color:#ff9a9a;
  border-color:#4a2525;
}

.status{
  color:#888;
  margin-top:36px;
  line-height:1.7;
}

.password-panel{
  border:1px solid #2a2a2a;
  background:#111;
  padding:18px;
  margin-top:36px;
}

.password-panel label{
  display:block;
  color:#aaa;
  margin-bottom:10px;
}

.password-panel input{
  width:100%;
  max-width:420px;
  border:1px solid #2a2a2a;
  background:#0b0b0b;
  color:#f2f2f2;
  padding:12px;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="article.html">文章</a>
    <a href="article-list.html">文章列表</a>
    <a href="publish.html">新建内容</a>
  </nav>
</header>

<main class="home">
  <p class="eyebrow">ARTICLE MANAGEMENT</p>
  <h1>文章管理</h1>
  <p class="intro">这里用于打开、检查和删除 Supabase 里的文章。</p>

  <div class="password-panel">
    <label for="admin-password">管理员密码</label>
    <input id="admin-password" type="password" autocomplete="current-password" placeholder="输入你原来 Vercel 后台用的密码">
  </div>

  <div id="status" class="status">正在加载文章...</div>
  <div id="list" class="manage-list"></div>
</main>

<script>
const SUPABASE_URL = "https://ndraugyrdnecqqcyfzjt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM";
const API = `${SUPABASE_URL}/rest/v1/contents?select=id,title,slug,intro,type,topic,created_at&type=eq.article&order=created_at.desc`;

let DATA = [];

function articleUrl(item){
  if(item.slug) return `content.html?slug=${encodeURIComponent(item.slug)}`;
  return `content.html?id=${encodeURIComponent(item.id)}`;
}

function render(list){
  const box = document.getElementById("list");
  const status = document.getElementById("status");
  box.innerHTML = "";

  if(!list.length){
    status.textContent = "暂时没有文章。";
    return;
  }

  status.textContent = "";
  box.innerHTML = list.map(item => `
    <div class="manage-item">
      <div class="meta">${item.topic || "未分类"} / ${item.type || "article"} / ID ${item.id}</div>
      <h2>${item.title || "未命名文章"}</h2>
      <p>${item.intro || ""}</p>
      <div class="actions">
        <a href="${articleUrl(item)}">打开文章</a>
        <button class="danger" type="button" onclick="deleteArticle('${item.id}', '${String(item.title || "").replace(/'/g, "\\'")}')">删除文章</button>
      </div>
    </div>
  `).join("");
}

async function loadArticles(){
  try{
    const res = await fetch(API, {
      headers:{
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    });

    if(!res.ok) throw new Error("load failed");

    DATA = await res.json();
    render(Array.isArray(DATA) ? DATA : []);
  }catch(err){
    document.getElementById("status").textContent = "文章加载失败，请检查 Supabase 配置。";
  }
}

async function deleteArticle(id, title){
  const name = title || `ID ${id}`;
  const password = document.getElementById("admin-password").value.trim();

  if(!password){
    alert("请先输入管理员密码。");
    document.getElementById("admin-password").focus();
    return;
  }

  const ok = confirm(`确定删除「${name}」吗？删除后不能在网站里恢复。`);

  if(!ok) return;

  const res = await fetch("/api/delete", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      id,
      password
    })
  });

  const result = await res.json().catch(() => ({}));

  if(!res.ok){
    alert(result.error || "删除失败，请检查管理员密码或 Vercel 环境变量。");
    return;
  }

  alert("已删除");
  DATA = DATA.filter(item => String(item.id) !== String(id));
  render(DATA);
  loadArticles();
}

loadArticles();
</script>

</body>
</html>
