<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>撰写案例｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.workspace{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(320px,0.8fr);
  gap:24px;
  margin-top:40px;
}

.panel,
.preview{
  border:1px solid #2a2a2a;
  background:#111;
  padding:22px;
}

.panel label{
  display:block;
  color:#aaa;
  margin:16px 0 8px;
}

.panel input,
.panel textarea,
.panel select{
  width:100%;
  border:1px solid #2a2a2a;
  background:#0b0b0b;
  color:#f2f2f2;
  padding:12px;
}

.panel textarea{
  min-height:120px;
  line-height:1.7;
  resize:vertical;
}

.media-insert{
  margin-top:22px;
  padding-top:18px;
  border-top:1px solid #2a2a2a;
}

.media-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.media-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

.media-actions button{
  border:1px solid #2a2a2a;
  background:#151515;
  color:#f2f2f2;
  padding:10px 14px;
  cursor:pointer;
}

.media-actions .light{
  background:#f2f2f2;
  color:#0b0b0b;
  font-weight:700;
}

.section-fields{
  display:grid;
  gap:12px;
  margin-top:18px;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:18px;
}

.actions button,
.actions a{
  border:1px solid #2a2a2a;
  background:#151515;
  color:#f2f2f2;
  padding:10px 14px;
  text-decoration:none;
  cursor:pointer;
}

.actions .primary{
  background:#f2f2f2;
  color:#0b0b0b;
  font-weight:700;
}

.preview{
  position:sticky;
  top:96px;
  align-self:start;
  white-space:pre-wrap;
  line-height:1.85;
  color:#d8d8d8;
}

.preview h2{
  margin-top:0;
}

.status{
  color:#aaa;
  margin-top:16px;
  line-height:1.7;
}

@media(max-width:900px){
  .workspace{
    grid-template-columns:1fr;
  }

  .media-row{
    grid-template-columns:1fr;
  }

  .preview{
    position:relative;
    top:auto;
  }
}
</style>
</head>
<body>
<header class="topbar">
  <div class="logo">YUNHENODE CMS</div>
  <nav>
    <a href="case.html">案例首页</a>
    <a href="case-list.html">案例列表</a>
    <a href="admin.html">后台首页</a>
  </nav>
</header>

<main class="home">
  <p class="eyebrow">CASE WRITER</p>
  <h1>撰写案例</h1>
  <p class="intro">选择模板，填写材料，生成结构稳定、极简清晰的案例文本。</p>

  <section class="workspace">
    <form class="panel" onsubmit="event.preventDefault(); saveCase();">
      <label for="admin-name">管理员名称</label>
      <input id="admin-name" value="YUNHE" autocomplete="username">

      <label for="admin-password">管理员密码</label>
      <input id="admin-password" type="password" autocomplete="current-password">

      <label for="template">案例模板</label>
      <select id="template" onchange="applyTemplate()">
        <option value="bo">Case 001 / BO H5 Modular Upgrade</option>
        <option value="apple">Case 002 / Apple 幽灵账号问题</option>
        <option value="architecture">Case 003 / 网站架构</option>
      </select>

      <label for="title">标题</label>
      <input id="title" oninput="renderPreview()">

      <label for="intro">一句简介</label>
      <textarea id="intro" oninput="renderPreview()"></textarea>

      <label for="topic">主题</label>
      <select id="topic" onchange="renderPreview()">
        <option value="平台">平台</option>
        <option value="品牌">品牌</option>
        <option value="城市">城市</option>
        <option value="组织">组织</option>
        <option value="消费">消费</option>
        <option value="艺术">艺术</option>
        <option value="空间">空间</option>
        <option value="技术">技术</option>
      </select>

      <div id="section-fields" class="section-fields"></div>

      <div class="media-insert">
        <h2>插入图片 / 视频</h2>
        <p class="status">可以直接上传文件，或者粘贴已有图片、视频地址。插入后会进入正文，文章页会自动显示成图片或播放器。</p>

        <div class="media-row">
          <div>
            <label for="media-kind">媒体类型</label>
            <select id="media-kind">
              <option value="image">图片</option>
              <option value="video">视频</option>
            </select>
          </div>
          <div>
            <label for="media-target">插入位置</label>
            <select id="media-target">
              <option value="random">随机插入到一个段落</option>
            </select>
          </div>
        </div>

        <label for="media-caption">说明文字</label>
        <input id="media-caption" placeholder="例如：现场界面、验证截图、演示视频">

        <label for="media-url">已有图片 / 视频地址</label>
        <input id="media-url" placeholder="https://...">

        <label for="media-file">从电脑上传</label>
        <input id="media-file" type="file" accept="image/*,video/*">

        <div class="media-actions">
          <button class="light" type="button" onclick="uploadAndInsertMedia()">上传并插入正文</button>
          <button type="button" onclick="insertMediaUrl()">插入已有地址</button>
          <button type="button" onclick="insertMediaUrl(true)">随机插入已有地址</button>
        </div>
      </div>

      <div class="actions">
        <button class="primary" type="submit">保存案例</button>
        <button type="button" onclick="copyPreview()">复制生成文本</button>
        <a href="case-list.html">查看案例列表</a>
      </div>
      <div id="status" class="status"></div>
    </form>

    <article class="preview">
      <h2>生成预览</h2>
      <div id="preview"></div>
    </article>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ndraugyrdnecqqcyfzjt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM";

const TEMPLATES = {
  bo:{
    title:"Case 001 / BO H5 Modular Upgrade",
    intro:"围绕 H5 模块升级的结构化判断与验证记录。",
    topic:"技术",
    sections:["Problem（问题）","Analysis（分析）","Decision（决策）","Validation（验证）"]
  },
  apple:{
    title:"Case 002 / Apple 幽灵账号问题",
    intro:"围绕异常账号、系统排查和沟通处理的案例记录。",
    topic:"平台",
    sections:["系统分析","排查流程","沟通策略"]
  },
  architecture:{
    title:"Case 003 / 网站架构",
    intro:"记录网站从代码、数据、部署到协作工具的基础架构。",
    topic:"技术",
    sections:["GitHub","Supabase","Vercel","Codex"]
  }
};

function escapeHtml(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function applyTemplate(){
  const template = TEMPLATES[document.getElementById("template").value];
  document.getElementById("title").value = template.title;
  document.getElementById("intro").value = template.intro;
  document.getElementById("topic").value = template.topic;
  document.getElementById("section-fields").innerHTML = template.sections.map((name, index) => `
    <label for="section-${index}">${escapeHtml(name)}</label>
    <textarea id="section-${index}" data-section="${escapeHtml(name)}" oninput="renderPreview()" placeholder="填写 ${escapeHtml(name)}"></textarea>
  `).join("");
  document.getElementById("media-target").innerHTML = `
    <option value="random">随机插入到一个段落</option>
    ${template.sections.map((name, index) => `<option value="section-${index}">插入到 ${escapeHtml(name)}</option>`).join("")}
  `;
  renderPreview();
}

function getMediaLine(kind, caption, url){
  const label = kind === "video" ? "视频" : "图片";
  const text = caption ? `${label}: ${caption}` : label;
  return `[${text}](${url})`;
}

function pickTargetTextarea(forceRandom){
  const sections = Array.from(document.querySelectorAll("[data-section]"));
  if(!sections.length) return null;

  const selected = document.getElementById("media-target").value;
  if(forceRandom || selected === "random"){
    return sections[Math.floor(Math.random() * sections.length)];
  }

  return document.getElementById(selected) || sections[0];
}

function appendToSection(textarea, line){
  const current = textarea.value.trim();
  textarea.value = current ? `${current}\n\n${line}` : line;
  textarea.focus();
  renderPreview();
}

function insertMediaUrl(forceRandom){
  const status = document.getElementById("status");
  const url = document.getElementById("media-url").value.trim();
  const kind = document.getElementById("media-kind").value;
  const caption = document.getElementById("media-caption").value.trim();
  const target = pickTargetTextarea(forceRandom);

  if(!url){
    status.textContent = "请先填写图片或视频地址。";
    return;
  }

  if(!target){
    status.textContent = "没有找到可以插入的位置。";
    return;
  }

  appendToSection(target, getMediaLine(kind, caption, url));
  status.textContent = "已经插入到正文。";
}

async function uploadAndInsertMedia(){
  const status = document.getElementById("status");
  const file = document.getElementById("media-file").files[0];
  const adminName = document.getElementById("admin-name").value.trim();
  const password = document.getElementById("admin-password").value.trim();
  const kind = document.getElementById("media-kind").value === "video" ? "video" : "photo";
  const caption = document.getElementById("media-caption").value.trim();
  const target = pickTargetTextarea();

  if(!file){
    status.textContent = "请先选择要上传的图片或视频。";
    return;
  }

  if(!adminName || !password){
    status.textContent = "请先填写管理员名称和密码。";
    return;
  }

  if(!target){
    status.textContent = "没有找到可以插入的位置。";
    return;
  }

  if(!window.supabase){
    status.textContent = "上传组件还没加载好，请刷新页面后再试。";
    return;
  }

  status.textContent = "正在申请上传通道...";

  const signRes = await fetch("./api/media-sign-upload", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminName,
      password,
      kind,
      fileName:file.name,
      contentType:file.type
    })
  });

  const sign = await signRes.json().catch(() => ({}));

  if(!signRes.ok){
    status.textContent = sign.error || "申请上传通道失败。";
    return;
  }

  status.textContent = "正在上传文件...";
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const uploadResult = await client.storage
    .from(sign.bucket)
    .uploadToSignedUrl(sign.path, sign.token, file);

  if(uploadResult.error){
    status.textContent = uploadResult.error.message || "上传失败。";
    return;
  }

  await fetch("./api/media-record", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminName,
      password,
      kind,
      title:caption || file.name,
      description:"从案例撰写页插入",
      fileName:file.name,
      path:sign.path,
      url:sign.publicUrl
    })
  }).catch(() => null);

  document.getElementById("media-url").value = sign.publicUrl;
  appendToSection(target, getMediaLine(kind === "video" ? "video" : "image", caption || file.name, sign.publicUrl));
  status.textContent = "上传成功，已经插入到正文。";
}

function buildCaseText(){
  const title = document.getElementById("title").value.trim();
  const intro = document.getElementById("intro").value.trim();
  const topic = document.getElementById("topic").value;
  const sections = Array.from(document.querySelectorAll("[data-section]"));
  const body = [
    title,
    "",
    intro,
    "",
    `主题：${topic}`,
    "",
    ...sections.flatMap(item => {
      const label = item.dataset.section;
      const value = item.value.trim() || "待填写";
      return [label, value, ""];
    })
  ];

  return body.join("\n").trim();
}

function renderPreview(){
  document.getElementById("preview").textContent = buildCaseText();
}

async function copyPreview(){
  await navigator.clipboard.writeText(buildCaseText());
  document.getElementById("status").textContent = "已复制生成文本。";
}

async function saveCase(){
  const status = document.getElementById("status");
  const title = document.getElementById("title").value.trim();
  const intro = document.getElementById("intro").value.trim();
  const body = buildCaseText();

  if(!title || !body){
    status.textContent = "标题和正文不能为空。";
    return;
  }

  status.textContent = "正在保存案例...";

  const res = await fetch("/api/publish", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminName:document.getElementById("admin-name").value.trim(),
      password:document.getElementById("admin-password").value.trim(),
      title,
      intro,
      body,
      type:"case",
      topic:document.getElementById("topic").value
    })
  });

  const result = await res.json().catch(() => ({}));

  if(!res.ok){
    status.textContent = result.error || "保存失败。";
    return;
  }

  status.innerHTML = `保存成功。<a href="${result.url}">打开案例</a>`;
}

applyTemplate();
</script>
</body>
</html>
