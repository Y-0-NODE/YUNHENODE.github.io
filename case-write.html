<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>撰写案例｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/case-write.css" />
  </head>
  <body>
    <header class="topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (window.history.length > 1) {
            event.preventDefault();
            window.history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="case.html">案例首页</a>
        <a href="case-list.html">案例列表</a>
        <a href="article-manage.html?type=case">案例管理</a>
        <a href="admin.html">后台首页</a>
      </nav>
    </header>

    <main class="home">
      <p class="eyebrow">CASE WRITER</p>
      <h1>撰写案例</h1>
      <p class="intro">选择模板，填写材料，生成结构稳定、极简清晰的案例文本。</p>

      <section class="workspace">
        <form
          class="panel"
          onsubmit="
            event.preventDefault();
            saveCase();
          "
        >
          <label for="admin-name">管理员名称</label>
          <input id="admin-name" value="YUNHE" autocomplete="username" />

          <label for="admin-password">管理员密码</label>
          <input id="admin-password" type="password" autocomplete="current-password" />

          <label for="template">Template（模板）</label>
          <select id="template" onchange="applyTemplate()">
            <optgroup label="系统档案模板">
              <option value="A">A｜Case Archive（案例库）</option>
              <option value="B">B｜Method Archive（方法库）</option>
              <option value="C">C｜Research Notes（研究记录）</option>
              <option value="D">D｜Project Archive（项目档案）</option>
              <option value="E">E｜Media Archive（媒体库）</option>
              <option value="X">X｜X Archive（未分类档案）</option>
            </optgroup>
            <optgroup label="保留的原案例模板">
              <option value="bo">Case 001｜BO H5 Modular Upgrade</option>
              <option value="apple">Case 002｜Apple 幽灵账号问题</option>
              <option value="architecture">Case 003｜网站架构</option>
            </optgroup>
          </select>

          <label for="knowledge-level">Knowledge Level（知识层级）</label>
          <select id="knowledge-level" onchange="renderPreview()" required>
            <option value="Observation">Observation（观察）</option>
            <option value="Analysis">Analysis（分析）</option>
            <option value="Decision">Decision（判断）</option>
            <option value="Validation">Validation（验证）</option>
            <option value="Method">Method（方法）</option>
          </select>

          <label for="title">标题</label>
          <input id="title" oninput="renderPreview()" />

          <label for="intro">一句简介</label>
          <textarea id="intro" oninput="renderPreview()"></textarea>

          <label for="topic">主题</label>
          <select id="topic" onchange="renderPreview()">
            <option value="平台">Platform（平台）</option>
            <option value="品牌">Brand（品牌）</option>
            <option value="组织">Organization（组织）</option>
            <option value="城市">City（城市）</option>
            <option value="消费">Consumption（消费）</option>
            <option value="艺术">Art（艺术）</option>
            <option value="空间">Space（空间）</option>
            <option value="梦境">Dream（梦境）</option>
            <option value="技术">Technology（技术）</option>
            <option value="文化">Culture（文化）</option>
            <option value="社会">Society（社会）</option>
            <option value="未分类">Unknown（未分类）</option>
          </select>

          <div id="section-fields" class="section-fields"></div>

          <div class="media-insert">
            <h2>插入图片 / 视频</h2>
            <p class="status">
              可以直接上传文件，或者粘贴已有图片、视频地址。插入后会进入正文，文章页会自动显示成图片或播放器。
            </p>

            <div class="media-row">
              <div>
                <label for="media-kind">媒体类型</label>
                <select id="media-kind">
                  <option value="image">图片</option>
                  <option value="video">视频</option>
                </select>
              </div>
              <div>
                <label for="media-target">插入位置</label>
                <select id="media-target">
                  <option value="random">随机插入到一个段落</option>
                </select>
              </div>
            </div>

            <label for="media-caption">说明文字</label>
            <input id="media-caption" placeholder="例如：现场界面、验证截图、演示视频" />

            <label for="media-url">已有图片 / 视频地址</label>
            <input id="media-url" placeholder="https://..." />

            <div class="media-actions">
              <button type="button" onclick="insertMediaUrl()">插入已有地址</button>
              <button type="button" onclick="insertMediaUrl(true)">随机插入已有地址</button>
              <a href="media-center.html" target="_blank">打开 Media Center</a>
            </div>
          </div>

          <div class="actions">
            <button class="primary" type="submit">保存案例</button>
            <button type="button" onclick="copyPreview()">复制生成文本</button>
            <a href="case-list.html">查看案例列表</a>
          </div>
          <div id="status" class="status"></div>
        </form>

        <article class="preview">
          <h2>生成预览</h2>
          <div id="preview"></div>
        </article>
      </section>
    </main>

    <script src="scripts/pages/case-write.js"></script>
    <script src="scripts/core/knowledge-client.js"></script>
  </body>
</html>
