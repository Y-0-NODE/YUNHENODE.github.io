<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>摄影作品管理｜YUNHENODE CMS</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/photography-manage.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="logo" href="admin.html">YUNHENODE CMS</a>
      <nav>
        <a href="gallery.html">摄影展示</a><a href="media-manage.html">上传媒体</a
        ><a href="admin.html">后台首页</a>
      </nav>
    </header>
    <main class="home">
      <p class="eyebrow">PHOTOGRAPHY ARCHIVE</p>
      <h1>摄影作品管理</h1>
      <p class="intro">
        这里同时显示 Supabase
        上传作品和本地文件夹同步作品。两种来源使用各自的保存方式，不会再遗漏旧摄影作品。
      </p>
      <section class="login">
        <input id="admin" value="YUNHE" aria-label="管理员名称" /><input
          id="password"
          type="password"
          placeholder="管理员密码"
        /><button onclick="loadItems()">进入摄影管理</button>
        <span id="status" class="muted"></span>
      </section>
      <div class="layout">
        <aside class="items" id="items"><p class="muted">验证后读取摄影作品。</p></aside>
        <section class="workspace">
          <h2 id="heading">请选择作品</h2>
          <p id="source-note" class="muted"></p>
          <div id="preview"></div>
          <div class="actions">
            <a id="edit" class="action" href="#">Edit｜编辑</a
            ><button onclick="removeItem()">Delete｜删除</button
            ><button onclick="duplicateItem()">Duplicate｜复制</button
            ><button onclick="lifecycle('archived')">Archive｜归档</button
            ><button onclick="history()">Version History｜历史版本</button>
          </div>
          <div class="grid">
            <label
              >Publish Settings｜发布设置<select id="publish" onchange="lifecycle(this.value)">
                <option value="published">公开发布</option>
                <option value="private">私人</option>
                <option value="draft">草稿</option>
                <option value="archived">归档</option>
              </select></label
            ><label>Metadata｜作品名称<input id="title" /></label
            ><label>拍摄日期<input id="shot" type="date" /></label
            ><label>作品说明<textarea id="description"></textarea></label
            ><section class="paid-settings wide">
              <p>PAID PHOTOGRAPHY｜付费摄影</p>
              <h3>连接统一付款二维码</h3>
              <label class="paid-switch">
                <input id="paywall-enabled" type="checkbox" />
                开启这件摄影作品的付费窗口
              </label>
              <label
                >选择价格<select id="paywall-price">
                  <option value="9.9">¥9.9</option>
                  <option value="19.9">¥19.9</option>
                  <option value="29.9">¥29.9</option>
                  <option value="59">¥59</option>
                  <option value="99">¥99</option>
                  <option value="199">¥199</option>
                </select></label
              >
              <a href="payment-settings.html" target="_blank">查看统一二维码设置</a>
            </section>
            <label class="wide">Collections｜作品集<textarea id="collections"></textarea></label
            ><label class="wide">Related Content｜关联内容<textarea id="related"></textarea></label
            ><label class="wide">Media Files｜媒体文件<textarea id="files"></textarea></label>
          </div>
          <div class="actions"><button onclick="save()">保存作品信息</button></div>
          <div id="history" class="history"></div>
        </section>
      </div>
    </main>
    <script src="scripts/pages/photography-manage.js?v=20260724-paywall-1"></script>
  </body>
</html>
