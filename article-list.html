<script>
const SUPABASE_URL = "https://ndraugyrdneccqcyfzjt.supabase.co";

const API = SUPABASE_URL + "/rest/v1/contents?select=*&order=created_at.desc";

let DATA = [];

function render(list){
  const el = document.getElementById("list");
  el.innerHTML = "";

  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h2>
        <a href="content.html?slug=${item.slug}">
          ${item.title}
        </a>
      </h2>

      <p>${item.intro || ""}</p>

      <small>${item.type} / ${item.topic}</small>

      <br><br>

      <button onclick="deletePost('${item.id}')">删除</button>
    `;

    el.appendChild(div);
  });
}

// 🧨 删除功能（关键）
function deletePost(id){
  fetch(`${SUPABASE_URL}/rest/v1/contents?id=eq.${id}`, {
    method: "DELETE",
    headers: {
      apikey: "sb_publishable_xxx",
      Authorization: "Bearer sb_publishable_xxx",
      "Content-Type": "application/json"
    }
  })
  .then(() => {
    alert("已删除");
    location.reload();
  });
}

function filterType(type){
  if(type === "all") return render(DATA);
  render(DATA.filter(i => i.type === type));
}

fetch(API)
  .then(r => r.json())
  .then(data => {
    DATA = data;
    render(DATA);
  });
</script>
