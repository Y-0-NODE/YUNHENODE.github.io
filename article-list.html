<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章列表｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:32px;
}

.toolbar button{
  border:1px solid #2a2a2a;
  background:#111;
  color:#ddd;
  padding:10px 14px;
  cursor:pointer;
}

.toolbar button:hover{
  background:#181818;
}

.status{
  color:#888;
  margin-top:36px;
  line-height:1.7;
}

.article-list{
  display:grid;
  gap:14px;
  margin-top:54px;
}

.article-row{
  display:grid;
  grid-template-columns:160px minmax(0,1fr);
  gap:28px;
  border-top:1px solid #2a2a2a;
  padding:24px 0;
  color:#f2f2f2;
  text-decoration:none;
}

.article-row:hover h2{
  color:#fff;
}

.article-row:visited,
.article-row:active{
  color:#f2f2f2;
}

.article-row .topic{
  color:#8a8a8a;
  font-size:14px;
  line-height:1.8;
}

.article-row h2{
  font-size:clamp(28px,4vw,54px);
  line-height:1.08;
  margin:0;
  color:#f2f2f2;
  text-decoration:none;
}

.article-row .subtitle{
  color:#cfcfcf;
  font-size:20px;
  line-height:1.55;
  margin:16px 0 0;
}

.article-row .excerpt{
  color:#888;
  font-size:15px;
  line-height:1.8;
  margin:18px 0 0;
  max-width:860px;
}

@media(max-width:760px){
  .article-row{
    grid-template-columns:1fr;
    gap:8px;
  }
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="visitor.html">访客入口</a>
    <a href="article-list.html">文章</a>
    <a href="article-category.html">分类</a>
    <a href="case-list.html">案例</a>
    <a href="gallery.html">作品</a>
    <a href="about.html">关于</a>
  </nav>
</header>

<main class="home">
  <p class="eyebrow">ARTICLE LIST</p>
  <h1>文章列表</h1>
  <p class="intro">从 Supabase 自动读取已发布文章。</p>

  <div class="toolbar">
    <button type="button" onclick="filterType('all')">全部</button>
    <button type="button" onclick="filterTopic('平台')">平台</button>
    <button type="button" onclick="filterTopic('品牌')">品牌</button>
    <button type="button" onclick="filterTopic('城市')">城市</button>
    <button type="button" onclick="filterTopic('组织')">组织</button>
    <button type="button" onclick="filterTopic('消费')">消费</button>
    <button type="button" onclick="filterTopic('艺术')">艺术</button>
    <button type="button" onclick="filterTopic('空间')">空间</button>
    <button type="button" onclick="filterTopic('梦境')">梦境</button>
  </div>

  <div id="status" class="status">正在加载文章...</div>
  <div id="list" class="article-list"></div>
</main>

<script>
const SUPABASE_URL = "https://ndraugyrdnecqqcyfzjt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM";
const API = `${SUPABASE_URL}/rest/v1/contents?select=id,title,slug,intro,type,topic,created_at&type=eq.article&order=created_at.desc`;

let DATA = [];

function articleUrl(item){
  if(item.slug) return `content.html?slug=${encodeURIComponent(item.slug)}`;
  return `content.html?id=${encodeURIComponent(item.id)}`;
}

function splitTitle(title){
  const text = String(title || "").trim();
  const match = text.match(/^(.*?)\s*(——|—|-)\s*(.+)$/);
  if(!match) return { title:text, subtitle:"" };
  return {
    title:match[1].trim() || text,
    subtitle:match[3].trim()
  };
}

function render(list){
  const el = document.getElementById("list");
  const status = document.getElementById("status");
  el.innerHTML = "";

  if(!list.length){
    status.textContent = "暂时没有文章。";
    return;
  }

  status.textContent = "";

  list.forEach(item => {
    const a = document.createElement("a");
    const titleParts = splitTitle(item.title);
    a.className = "article-row";
    a.href = articleUrl(item);

    a.innerHTML = `
      <div class="topic">${item.topic || "ARTICLE"}<br>${String(item.created_at || "").slice(0,10)}</div>
      <div>
        <h2>${titleParts.title || "未命名文章"}</h2>
        <p class="subtitle">${titleParts.subtitle || item.intro || ""}</p>
        ${titleParts.subtitle && item.intro ? `<p class="excerpt">${item.intro}</p>` : ""}
      </div>
    `;

    el.appendChild(a);
  });
}

function filterType(type){
  if(type === "all") return render(DATA);
  render(DATA.filter(i => i.type === type));
}

function filterTopic(topic){
  render(DATA.filter(i => i.topic === topic));
}

fetch(API, {
  headers:{
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`
  }
})
  .then(r => {
    if(!r.ok) throw new Error("load failed");
    return r.json();
  })
  .then(data => {
    DATA = Array.isArray(data) ? data : [];
    render(DATA);
  })
  .catch(() => {
    document.getElementById("status").textContent = "文章加载失败，请检查 Supabase 配置。";
  });
</script>

</body>
</html>
