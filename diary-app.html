<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内部日记 App｜云鹤系统</title>
    <meta name="theme-color" content="#0b0b0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="云鹤日记" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="app-icon.svg" />
    <link rel="stylesheet" href="assets/styles/pages/diary-app.css" />
  </head>
  <body>
    <section id="app" class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>内部日记</h1>
          <div id="count" class="sync">0 篇</div>
        </div>
        <div id="sync-mode" class="sync">正在等待登录</div>

        <input
          id="search"
          class="search"
          type="search"
          placeholder="搜索日记"
          oninput="renderList()"
        />

        <div class="toolbar">
          <button class="btn primary" type="button" onclick="newEntry()">新建</button>
          <button class="btn" type="button" onclick="exportData()">导出</button>
          <button
            class="btn"
            type="button"
            onclick="document.getElementById('import-file').click()"
          >
            导入
          </button>
          <button class="btn" type="button" onclick="lockApp()">锁定</button>
        </div>

        <input
          id="import-file"
          class="file-input"
          type="file"
          accept="application/json"
          onchange="importData(event)"
        />
        <div id="entry-list" class="entry-list"></div>
      </aside>

      <main class="main">
        <div class="topline">
          <div class="date" id="current-date"></div>
          <a class="btn" href="admin.html">后台首页</a>
        </div>

        <section id="empty" class="empty">选择一篇日记，或者新建一篇。</section>

        <section id="editor" class="editor" hidden>
          <input
            id="title"
            class="title-input"
            type="text"
            placeholder="标题"
            oninput="markDirty()"
          />

          <div class="meta-row">
            <input id="entry-date" type="date" onchange="markDirty()" />
            <select id="mood" onchange="markDirty()">
              <option value="平静">平静</option>
              <option value="清醒">清醒</option>
              <option value="疲惫">疲惫</option>
              <option value="焦虑">焦虑</option>
              <option value="开心">开心</option>
              <option value="混乱">混乱</option>
            </select>
            <input id="tags" type="text" placeholder="标签，用逗号分隔" oninput="markDirty()" />
          </div>

          <textarea
            id="body"
            class="body-input"
            placeholder="写点什么"
            oninput="markDirty()"
          ></textarea>

          <div class="actions">
            <button class="btn primary" type="button" onclick="saveEntry()">保存</button>
            <button class="btn" type="button" onclick="duplicateEntry()">复制</button>
            <button class="btn danger" type="button" onclick="deleteEntry()">删除</button>
          </div>
        </section>
      </main>
    </section>

    <script src="scripts/pages/diary-app.js"></script>
  </body>
</html>
