<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜索中心｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.shell{max-width:1320px;margin:auto;padding:130px clamp(18px,5vw,64px) 70px}.panel{border:1px solid #292929;background:#101010;padding:20px;margin-top:20px}.hidden{display:none!important}.login{max-width:560px}.fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.wide{grid-column:1/-1}label{display:block;color:#999;margin:10px 0 7px}input,textarea,select{width:100%;border:1px solid #303030;background:#0b0b0b;color:#eee;padding:11px}textarea{min-height:90px;resize:vertical}button{border:1px solid #333;background:#151515;color:#eee;padding:10px 14px;cursor:pointer}.primary{background:#eee;color:#111;font-weight:700}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:15px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:22px}.metric{border:1px solid #292929;padding:18px;background:#101010}.metric b{display:block;font-size:30px}.metric span,.status{color:#888}.workspace{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(330px,.75fr);gap:18px}.result-list{display:grid;gap:10px;margin-top:16px}.result{width:100%;text-align:left;border:1px solid #292929;background:#0d0d0d;padding:15px;color:#eee}.result b{display:block;font-size:17px}.result small{display:block;color:#777;margin-top:7px}.keywords{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}.keyword{border:1px solid #2d2d2d;padding:6px 8px;color:#aaa;font-size:13px}.section-title{margin:0 0 8px;font-size:24px}.query-row{display:grid;grid-template-columns:1fr 190px;gap:10px}.hint{color:#777;line-height:1.7;font-size:13px}@media(max-width:850px){.shell{padding:28px 14px 55px}.workspace,.fields{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.query-row{grid-template-columns:1fr}.wide{grid-column:auto}}
</style>
</head>
<body>
<header class="topbar cms-topbar"><a class="logo logo-back" href="admin.html" onclick="if(history.length>1){event.preventDefault();history.back()}" aria-label="返回上一页">YUNHENODE CMS</a><nav><a href="admin.html">后台</a><a href="knowledge-system.html">知识系统</a><a href="index.html">网站首页</a></nav></header>
<main class="shell">
  <p class="eyebrow">SEARCH CENTER / INDEX CONTROL</p><h1>搜索中心</h1><p class="intro">全站搜索、SEO 索引、标签管理与关键词库。</p>
  <section id="login" class="panel login"><label>管理员名称</label><input id="name" value="YUNHE" autocomplete="username"><label>管理员密码</label><input id="password" type="password" autocomplete="current-password"><div class="actions"><button class="primary" onclick="loadIndex()">登录并生成索引</button></div><div id="login-status" class="status"></div></section>
  <section id="dashboard" class="hidden">
    <div class="metrics"><div class="metric"><b id="total">0</b><span>索引内容</span></div><div class="metric"><b id="articles">0</b><span>文章</span></div><div class="metric"><b id="cases">0</b><span>案例</span></div><div class="metric"><b id="keyword-count">0</b><span>关键词</span></div></div>
    <section class="panel"><div class="query-row"><input id="query" placeholder="搜索标题、正文、主题、标签或关键词" oninput="render()"><select id="type-filter" onchange="render()"><option value="">全部类型</option><option value="article">文章</option><option value="case">案例</option><option value="thought">随笔</option><option value="video">视频</option></select></div><div class="actions"><button onclick="loadIndex(true)">重建索引</button><button onclick="downloadIndex()">导出搜索索引 JSON</button></div><div id="index-status" class="status"></div></section>
    <div class="workspace"><section class="panel"><h2 class="section-title">全站搜索</h2><div id="results" class="result-list"></div></section><aside><section class="panel"><h2 class="section-title">SEO 编辑</h2><p id="empty-editor" class="hint">从左侧选择一篇文章或案例。</p><div id="editor" class="hidden"><label>内容标题</label><input id="edit-title"><label>SEO 标题</label><input id="seo-title"><label>SEO 描述</label><textarea id="seo-description"></textarea><label>关键词（逗号分隔）</label><textarea id="edit-keywords"></textarea><div class="actions"><button class="primary" onclick="saveSeo()">保存 SEO 与关键词</button><a id="open-content" class="button" target="_blank">打开内容</a></div><div id="save-status" class="status"></div></div></section><section class="panel"><h2 class="section-title">关键词库</h2><div id="keywords" class="keywords"></div></section></aside></div>
  </section>
</main>
<script>
let ITEMS=[], CURRENT=null, AUTH={};
const esc=s=>String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
async function loadIndex(refresh=false){AUTH={adminName:document.getElementById("name").value.trim(),password:document.getElementById("password").value};const status=document.getElementById(refresh?"index-status":"login-status");status.textContent="正在读取 Supabase 内容…";try{const res=await fetch("./api/search-index",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(AUTH)});const out=await res.json();if(!res.ok)throw new Error(out.error||"读取失败");ITEMS=out.data||[];document.getElementById("login").classList.add("hidden");document.getElementById("dashboard").classList.remove("hidden");status.textContent=`索引已生成：${new Date(out.generatedAt).toLocaleString("zh-CN")}`;metrics();render()}catch(e){status.textContent=e.message}}
function metrics(){const all=new Set(ITEMS.flatMap(x=>x.keywords||[]));document.getElementById("total").textContent=ITEMS.length;document.getElementById("articles").textContent=ITEMS.filter(x=>x.type==="article").length;document.getElementById("cases").textContent=ITEMS.filter(x=>x.type==="case").length;document.getElementById("keyword-count").textContent=all.size;const freq={};ITEMS.flatMap(x=>x.keywords||[]).forEach(k=>freq[k]=(freq[k]||0)+1);document.getElementById("keywords").innerHTML=Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(([k,n])=>`<span class="keyword">${esc(k)} · ${n}</span>`).join("")||'<span class="status">暂无关键词</span>'}
function render(){const q=document.getElementById("query").value.trim().toLowerCase(),type=document.getElementById("type-filter").value;const rows=ITEMS.filter(x=>(!type||x.type===type)&&(!q||[x.title,x.intro,x.body,x.topic,...(x.keywords||[])].join(" ").toLowerCase().includes(q)));document.getElementById("index-status").textContent=`当前显示 ${rows.length} / ${ITEMS.length} 条`;document.getElementById("results").innerHTML=rows.map(x=>`<button class="result" onclick="selectItem('${x.id}')"><b>${esc(x.title)}</b><small>${esc(x.type)} · ${esc(x.topic)} · ${esc(x.seo_description||x.intro).slice(0,100)}</small></button>`).join("")||'<p class="status">没有匹配内容。</p>'}
function selectItem(id){CURRENT=ITEMS.find(x=>String(x.id)===String(id));if(!CURRENT)return;document.getElementById("empty-editor").classList.add("hidden");document.getElementById("editor").classList.remove("hidden");document.getElementById("edit-title").value=CURRENT.title||"";document.getElementById("seo-title").value=CURRENT.seo_title||CURRENT.title||"";document.getElementById("seo-description").value=CURRENT.seo_description||CURRENT.intro||"";document.getElementById("edit-keywords").value=(CURRENT.keywords||[]).join("，");document.getElementById("open-content").href=`content.html?slug=${encodeURIComponent(CURRENT.slug||"")}`;document.getElementById("save-status").textContent=CURRENT.type==="thought"?"随笔参与搜索，但不写入 SEO 元数据。":""}
async function saveSeo(){if(!CURRENT||CURRENT.type==="thought")return;const payload={...AUTH,id:CURRENT.id,title:document.getElementById("edit-title").value.trim(),intro:CURRENT.intro||"",topic:CURRENT.topic||"未分类",body:CURRENT.body||"",template:CURRENT.template,knowledgeLevel:CURRENT.knowledge_level,archive:CURRENT.archive,relatedDocuments:CURRENT.related_documents,seoTitle:document.getElementById("seo-title").value.trim(),seoDescription:document.getElementById("seo-description").value.trim(),keywords:document.getElementById("edit-keywords").value.split(/[,，]/).map(x=>x.trim()).filter(Boolean)};const s=document.getElementById("save-status");s.textContent="正在保存…";const res=await fetch("./api/update",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});const out=await res.json();if(!res.ok){s.textContent=out.error||"保存失败";return}s.textContent="SEO 与关键词已保存。";await loadIndex(true)}
function downloadIndex(){const blob=new Blob([JSON.stringify({generatedAt:new Date().toISOString(),items:ITEMS},null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`yunhe-search-index-${Date.now()}.json`;a.click();URL.revokeObjectURL(a.href)}
</script>
</body></html>
