<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>搜索中心｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/search-center.css" />
  </head>
  <body>
    <header class="topbar cms-topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (history.length > 1) {
            event.preventDefault();
            history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="admin.html">后台</a><a href="knowledge-system.html">知识系统</a
        ><a href="index.html">网站首页</a>
      </nav>
    </header>
    <main class="shell">
      <p class="eyebrow">SEARCH CENTER / INDEX CONTROL</p>
      <h1>搜索中心</h1>
      <p class="intro">全站搜索、SEO 索引、标签管理与关键词库。</p>
      <section id="login" class="panel login">
        <label>管理员名称</label><input id="name" value="YUNHE" autocomplete="username" /><label
          >管理员密码</label
        ><input id="password" type="password" autocomplete="current-password" />
        <div class="actions">
          <button class="primary" onclick="loadIndex()">登录并生成索引</button>
        </div>
        <div id="login-status" class="status"></div>
      </section>
      <section id="dashboard" class="hidden">
        <div class="metrics">
          <div class="metric"><b id="total">0</b><span>索引内容</span></div>
          <div class="metric"><b id="articles">0</b><span>文章</span></div>
          <div class="metric"><b id="cases">0</b><span>案例</span></div>
          <div class="metric"><b id="keyword-count">0</b><span>关键词</span></div>
        </div>
        <section class="panel">
          <div class="query-row">
            <input
              id="query"
              placeholder="搜索标题、正文、主题、标签或关键词"
              oninput="render()"
            /><select id="type-filter" onchange="render()">
              <option value="">全部类型</option>
              <option value="article">文章</option>
              <option value="case">案例</option>
              <option value="thought">随笔</option>
              <option value="video">视频</option>
            </select>
          </div>
          <div class="actions">
            <button onclick="loadIndex(true)">重建索引</button
            ><button onclick="downloadIndex()">导出搜索索引 JSON</button>
          </div>
          <div id="index-status" class="status"></div>
        </section>
        <div class="workspace">
          <section class="panel">
            <h2 class="section-title">全站搜索</h2>
            <div id="results" class="result-list"></div>
          </section>
          <aside>
            <section class="panel">
              <h2 class="section-title">SEO 编辑</h2>
              <p id="empty-editor" class="hint">从左侧选择一篇文章或案例。</p>
              <div id="editor" class="hidden">
                <label>内容标题</label><input id="edit-title" /><label>SEO 标题</label
                ><input id="seo-title" /><label>SEO 描述</label
                ><textarea id="seo-description"></textarea><label>关键词（逗号分隔）</label
                ><textarea id="edit-keywords"></textarea>
                <div class="actions">
                  <button class="primary" onclick="saveSeo()">保存 SEO 与关键词</button
                  ><a id="open-content" class="button" target="_blank">打开内容</a>
                </div>
                <div id="save-status" class="status"></div>
              </div>
            </section>
            <section class="panel">
              <h2 class="section-title">关键词库</h2>
              <div id="keywords" class="keywords"></div>
            </section>
          </aside>
        </div>
      </section>
    </main>
    <script src="scripts/pages/search-center.js"></script>
  </body>
</html>
