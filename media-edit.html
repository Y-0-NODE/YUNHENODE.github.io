<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>编辑作品｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/media-edit.css" />
  </head>

  <body>
    <header class="topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (window.history.length > 1) {
            event.preventDefault();
            window.history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="media-center.html">媒体中心</a>
        <a href="media-manage.html">上传作品</a>
        <a href="admin.html">后台首页</a>
      </nav>
    </header>

    <main class="home">
      <p class="eyebrow">MEDIA EDIT</p>
      <h1>编辑作品</h1>
      <p class="intro">修改作品名称、介绍和拍摄日期。上传日期保留第一次上传时间，不在这里修改。</p>

      <section class="panel">
        <div id="preview" class="preview"></div>

        <label for="admin-name">账户名称</label>
        <input id="admin-name" type="text" value="YUNHE" />

        <label for="admin-password">账户密码</label>
        <input id="admin-password" type="password" />

        <label for="title">作品名称</label>
        <input id="title" type="text" />

        <label for="description">作品介绍</label>
        <textarea id="description"></textarea>

        <label for="shot-at">拍摄日期</label>
        <input id="shot-at" type="date" />

        <label>上传日期</label>
        <div id="created-at" class="readonly">未标注</div>

        <button id="save-work" class="primary" type="button" onclick="saveWork()">保存修改</button>
        <button class="danger" type="button" onclick="deleteWork()">删除作品</button>
        <a href="media-center.html">返回媒体中心</a>
        <div id="status" class="status">正在读取作品...</div>
      </section>
    </main>

    <script src="scripts/core/utils.js"></script>
    <script src="scripts/pages/media-edit.js"></script>
  </body>
</html>
