<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编辑作品｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.panel{
  border:1px solid #2a2a2a;
  background:#111;
  padding:22px;
  margin-top:36px;
}

.panel label{
  display:block;
  color:#aaa;
  margin:16px 0 8px;
}

.panel input,
.panel textarea{
  width:100%;
  border:1px solid #2a2a2a;
  background:#0b0b0b;
  color:#f2f2f2;
  padding:12px;
}

.panel textarea{
  min-height:140px;
}

.panel button,
.panel a{
  display:inline-block;
  margin-top:18px;
  margin-right:10px;
  border:1px solid #2a2a2a;
  background:#111;
  color:#f2f2f2;
  padding:12px 14px;
  text-decoration:none;
  font-weight:700;
  cursor:pointer;
}

.preview{
  max-width:420px;
  margin-top:18px;
  border:1px solid #2a2a2a;
  background:#050505;
}

.preview img,
.preview video{
  width:100%;
  display:block;
}

.readonly{
  color:#888;
  line-height:1.7;
}

.status{
  color:#aaa;
  margin-top:18px;
  line-height:1.7;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE CMS</div>
  <nav>
    <a href="gallery.html">艺术摄影</a>
    <a href="media-manage.html">上传作品</a>
    <a href="admin.html">后台首页</a>
  </nav>
</header>

<main class="home">
  <p class="eyebrow">MEDIA EDIT</p>
  <h1>编辑作品</h1>
  <p class="intro">修改作品名称、介绍和拍摄日期。上传日期保留第一次上传时间，不在这里修改。</p>

  <section class="panel">
    <div id="preview" class="preview"></div>

    <label for="admin-name">账户名称</label>
    <input id="admin-name" type="text" value="YUNHE">

    <label for="admin-password">账户密码</label>
    <input id="admin-password" type="password">

    <label for="title">作品名称</label>
    <input id="title" type="text">

    <label for="description">作品介绍</label>
    <textarea id="description"></textarea>

    <label for="shot-at">拍摄日期</label>
    <input id="shot-at" type="date">

    <label>上传日期</label>
    <div id="created-at" class="readonly">未标注</div>

    <button type="button" onclick="saveWork()">保存修改</button>
    <a href="gallery.html">返回作品页</a>
    <div id="status" class="status">正在读取作品...</div>
  </section>
</main>

<script>
let CURRENT = null;

function escapeHtml(value){
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDateTime(value){
  if(!value) return "未标注";
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return String(value);
  const pad = n => String(n).padStart(2, "0");
  return `${date.getFullYear()}/${pad(date.getMonth() + 1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}

function toDateInput(value){
  if(!value) return "";
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return String(value).slice(0, 10);
  const pad = n => String(n).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
}

async function loadWork(){
  const id = new URLSearchParams(location.search).get("id");
  const status = document.getElementById("status");
  if(!id){
    status.textContent = "缺少作品 ID。";
    return;
  }

  const res = await fetch("./api/media-list", { cache:"no-store" });
  const result = await res.json().catch(() => ({}));
  const list = Array.isArray(result.data) ? result.data : [];
  CURRENT = list.find(item => String(item.id) === String(id));

  if(!CURRENT){
    status.textContent = "没有找到这个作品。";
    return;
  }

  const preview = document.getElementById("preview");
  preview.innerHTML = CURRENT.kind === "video"
    ? `<video src="${escapeHtml(CURRENT.url)}" controls playsinline></video>`
    : `<img src="${escapeHtml(CURRENT.url)}" alt="${escapeHtml(CURRENT.title || "作品")}">`;

  document.getElementById("title").value = CURRENT.title || "";
  document.getElementById("description").value = CURRENT.description || "";
  document.getElementById("shot-at").value = toDateInput(CURRENT.shot_at);
  document.getElementById("created-at").textContent = formatDateTime(CURRENT.created_at);
  status.textContent = "可以修改作品信息。";
}

async function saveWork(){
  const status = document.getElementById("status");
  if(!CURRENT){
    status.textContent = "没有正在编辑的作品。";
    return;
  }

  const adminName = document.getElementById("admin-name").value.trim();
  const password = document.getElementById("admin-password").value.trim();
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("description").value.trim();
  const shotAt = document.getElementById("shot-at").value;

  if(!adminName || !password){
    status.textContent = "请填写账户名称和密码。";
    return;
  }

  status.textContent = "正在保存...";
  const res = await fetch("./api/media-update", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      id:CURRENT.id,
      adminName,
      password,
      title,
      description,
      shot_at:shotAt || null
    })
  });
  const result = await res.json().catch(() => ({}));
  if(!res.ok){
    const detail = result.detail ? `｜${result.detail}` : "";
    status.textContent = `${result.error || "保存失败。"}${detail}`;
    return;
  }
  status.textContent = "已保存。回到艺术摄影页面刷新后可以看到新信息。";
}

loadWork();
</script>
</body>
</html>
