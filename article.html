<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>文章｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
    <a href="about.html">关于我</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">ARTICLE SYSTEM</p>
<h1>文章系统</h1>
<p class="intro">这里自动显示通过后台发布的文章内容。</p>

<div id="content-list" class="grid"></div>

</main>

<script>
async function loadContent() {
  const res = await fetch("content-list.json");
  const list = await res.json();

  const articles = list.filter(item => item.type === "article");

  const box = document.getElementById("content-list");

  if (!articles.length) {
    box.innerHTML = "<p>暂无文章内容。</p>";
    return;
  }

  box.innerHTML = articles.map(item => `
    <a class="card" href="${item.url}">
      <span>${item.topic || item.tag || "ARTICLE"}</span>
      <h2>${item.title}</h2>
      <p>${item.intro}</p>
    </a>
  `).join("");
}

loadContent();
</script>

</body>
</html>
