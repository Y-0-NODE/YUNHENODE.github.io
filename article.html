<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.section-title{
  margin-top:70px;
}

.status{
  color:#888;
  margin-top:36px;
  line-height:1.7;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
    <a href="about.html">关于我</a>
  </nav>
</header>

<main class="home">
  <p class="eyebrow">ARTICLE SYSTEM</p>
  <h1>文章系统</h1>
  <p class="intro">这里管理文章内容，并自动显示通过后台发布的文章。</p>

  <div class="grid">
    <a class="card" href="publish.html">
      <span>01</span>
      <h2>上传文章</h2>
      <p>进入发布后台</p>
    </a>

    <a class="card" href="article-list.html">
      <span>02</span>
      <h2>文章列表</h2>
      <p>查看已发布内容</p>
    </a>

    <a class="card" href="article-category.html">
      <span>03</span>
      <h2>文章分类</h2>
      <p>按主题整理内容</p>
    </a>

    <a class="card" href="article-draft.html">
      <span>04</span>
      <h2>草稿</h2>
      <p>未发布内容</p>
    </a>
  </div>

  <section class="section-title">
    <h2>最新文章</h2>
    <div id="status" class="status">正在加载文章...</div>
    <div id="content-list" class="grid"></div>
  </section>
</main>

<script>
const SUPABASE_URL = "https://ndraugyrdnecqqcyfzjt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM";
const API = `${SUPABASE_URL}/rest/v1/contents?select=id,title,slug,intro,topic,type,created_at&type=eq.article&order=created_at.desc&limit=8`;

function articleUrl(item){
  if(item.slug) return `content.html?slug=${encodeURIComponent(item.slug)}`;
  return `content.html?id=${encodeURIComponent(item.id)}`;
}

function renderList(data){
  const box = document.getElementById("content-list");
  const status = document.getElementById("status");

  if(!data.length){
    status.textContent = "暂时没有文章。";
    return;
  }

  status.textContent = "";
  box.innerHTML = data.map(item => `
    <a class="card" href="${articleUrl(item)}">
      <span>${item.topic || "ARTICLE"}</span>
      <h2>${item.title || "未命名文章"}</h2>
      <p>${item.intro || ""}</p>
    </a>
  `).join("");
}

fetch(API, {
  headers:{
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`
  }
})
  .then(res => {
    if(!res.ok) throw new Error("load failed");
    return res.json();
  })
  .then(data => renderList(Array.isArray(data) ? data : []))
  .catch(() => {
    document.getElementById("status").textContent = "文章加载失败，请检查 Supabase 配置。";
  });
</script>

</body>
</html>
