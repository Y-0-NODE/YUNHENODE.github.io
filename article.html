<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>文章｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
    <a href="about.html">关于我</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">ARTICLE SYSTEM</p>
<h1>文章系统</h1>
<p class="intro">这里管理文章内容，并自动显示通过后台发布的文章。</p>

<div class="grid">
  <a class="card" href="publish.html">
    <span>01</span>
    <h2>上传文章</h2>
    <p>进入发布后台，内容类型选择“文章”。</p>
  </a>

  <a class="card" href="#article-list">
    <span>02</span>
    <h2>文章列表</h2>
    <p>查看已经发布的文章内容。</p>
  </a>

  <a class="card" href="article-category.html">
    <span>03</span>
    <h2>文章分类</h2>
    <p>按研究主题整理文章。</p>
  </a>

  <a class="card" href="article-draft.html">
    <span>04</span>
    <h2>文章草稿</h2>
    <p>暂存文章选题与未发布内容。</p>
  </a>
</div>

<hr>

<h2 id="article-list">文章列表</h2>
<div id="content-list" class="grid"></div>

</main>

<script>
async function loadContent() {
  const res = await fetch("content-list.json");
  const list = await res.json();

  const articles = list.filter(item => item.type === "article");
  const box = document.getElementById("content-list");

  if (!articles.length) {
    box.innerHTML = "<p>暂无文章内容。</p>";
    return;
  }

  box.innerHTML = articles.map(item => `
    <a class="card" href="${item.url}">
      <span>${item.topic || item.tag || "ARTICLE"}</span>
      <h2>${item.title}</h2>
      <p>${item.intro}</p>
    </a>
  `).join("");
}

loadContent();
</script>

</body>
</html>
