<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>文章详情</title>
<style>
body{
  background:#0a0a0a;
  color:#fff;
  font-family:Arial;
  padding:40px;
}
a{color:#888}
</style>
</head>

<body>

<a href="index.html">← 返回</a>

<h1 id="title"></h1>
<p id="intro"></p>
<div id="body"></div>

<script>
const SUPABASE_URL = "https://你的项目.supabase.co";
const params = new URLSearchParams(location.search);
const slug = params.get("slug");

fetch(`${SUPABASE_URL}/rest/v1/contents?slug=eq.${slug}`)
.then(r=>r.json())
.then(data=>{
  const post = data[0];

  document.getElementById("title").innerText = post.title;
  document.getElementById("intro").innerText = post.intro || "";
  document.getElementById("body").innerHTML = post.body || "";
});
</script>

</body>
</html>
