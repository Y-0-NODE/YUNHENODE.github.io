<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章详情｜云鹤系统</title>
<style>
:root{
  color-scheme:dark;
  --bg:#090909;
  --surface:#101010;
  --line:#252525;
  --text:#eeeeee;
  --muted:#9a9a9a;
  --soft:#cfcfcf;
  --accent:#ffffff;
  --bg-image:none;
  --bg-opacity:0.18;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background-color:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:linear-gradient(rgba(9,9,9,calc(1 - var(--bg-opacity))), rgba(9,9,9,calc(1 - var(--bg-opacity)))), var(--bg-image);
  background-size:cover;
  background-position:center;
  opacity:1;
  z-index:-1;
}

a{
  color:inherit;
  text-decoration:none;
}

.reading-shell{
  width:100%;
  max-width:none;
  margin:0;
  padding:32px clamp(24px,5vw,104px) 104px;
}

.article-tools{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:18px;
  flex-wrap:wrap;
  width:100%;
  max-width:100%;
  min-height:48px;
  margin-bottom:86px;
  padding:0 0 14px;
  border-bottom:1px solid #222;
  color:var(--muted);
}

.article-tools a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:34px;
  border-bottom:2px solid transparent;
  padding:0 2px;
  font-size:13px;
  line-height:1;
  white-space:nowrap;
}

.article-tools a:hover{
  color:var(--text);
  border-bottom-color:var(--text);
}

.kicker{
  color:var(--muted);
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:18px;
}

h1{
  max-width:1500px;
  font-size:clamp(42px,6.6vw,92px);
  line-height:1.05;
  margin:0;
  letter-spacing:0;
}

#intro{
  color:var(--soft);
  font-size:18px;
  line-height:1.85;
  margin:18px 0 16px;
  max-width:1120px;
}

#subtitle{
  color:var(--soft);
  font-size:clamp(22px,2.4vw,34px);
  line-height:1.35;
  font-weight:700;
  margin:18px 0 22px;
  max-width:1280px;
}

.article-meta-footer,
.article-meta-top{
  color:var(--muted);
  font-size:13px;
  line-height:1.8;
  margin:0 0 48px;
}

.article-meta-footer{
  margin:56px 0 0;
  padding-top:18px;
  border-top:1px solid var(--line);
}

.article-body{
  display:grid;
  gap:0;
  width:100%;
  max-width:none;
}

.doc-title{
  font-size:30px;
  line-height:1.25;
  font-weight:800;
  margin:20px 0 26px;
}

.section-title{
  font-size:26px;
  line-height:1.35;
  font-weight:800;
  margin:52px 0 18px;
  padding-top:34px;
  border-top:1px solid var(--line);
}

.sub-title{
  color:var(--soft);
  font-size:19px;
  line-height:1.5;
  font-weight:700;
  margin:30px 0 10px;
}

.paragraph{
  color:#d8d8d8;
  font-size:16px;
  line-height:1.95;
  margin:0 0 14px;
  white-space:pre-wrap;
  max-width:1180px;
}

.numbered{
  display:grid;
  grid-template-columns:34px 1fr;
  gap:12px;
  color:#dcdcdc;
  font-size:16px;
  line-height:1.85;
  margin:0 0 8px;
  max-width:1180px;
}

.numbered span{
  color:var(--accent);
  font-weight:800;
}

.meta-line{
  color:var(--muted);
  font-size:14px;
  line-height:1.8;
  margin:0 0 18px;
  max-width:1180px;
}

.source-link{
  color:#a8a8a8;
  font-size:14px;
  line-height:1.8;
  margin:22px 0;
  max-width:1180px;
}

.source-link a{
  color:#bdbdbd;
  text-decoration:underline;
  text-decoration-thickness:1px;
  text-underline-offset:4px;
}

.source-link a:hover{
  color:#ffffff;
}

.empty{
  color:var(--muted);
}

.media-block{
  width:100%;
  max-width:1480px;
  margin:34px 0 42px;
}

.media-block img,
.media-block video{
  display:block;
  width:100%;
  max-height:72vh;
  object-fit:contain;
  background:#050505;
  border:1px solid var(--line);
}

.media-block figcaption{
  color:var(--muted);
  font-size:13px;
  line-height:1.7;
  margin-top:10px;
}

@media(max-width:700px){
  .reading-shell{
    padding:28px 18px 64px;
  }

  h1{
    font-size:clamp(34px,12vw,52px);
  }

  .article-tools{
    margin-bottom:36px;
    width:100%;
  }

  #intro{
    font-size:16px;
    margin-bottom:34px;
  }

  .doc-title{
    font-size:24px;
  }

  .section-title{
    font-size:22px;
  }
}
</style>
</head>

<body>
<main class="reading-shell">
  <nav class="article-tools">
    <a id="back-link" href="article-list.html">返回列表</a>
    <span id="manage-tools" hidden></span>
  </nav>

  <p class="kicker">YUNHENODE / CONTENT</p>
  <h1 id="title">加载中...</h1>
  <p id="subtitle"></p>
  <p id="intro"></p>
  <p id="meta-top" class="article-meta-top"></p>
  <article id="body" class="article-body"></article>
  <p id="meta-footer" class="article-meta-footer"></p>
</main>

<script>
const SUPABASE_URL = "https://ndraugyrdnecqqcyfzjt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM";

const params = new URLSearchParams(location.search);
const slug = params.get("slug");
const id = params.get("id");

const SITE_DESIGN_KEY = "yunhe.site.design.v1";
const SECTION_RE = /^(Problem|Analysis|Decision|Validation|系统分析|排查流程|沟通策略|GitHub|Supabase|Vercel|Codex)(（[^）]+）|\([^)]*\))?$/i;
const META_RE = /^(主题|类型|编号|状态|日期)：/;

function applyDesign(){
  const design = JSON.parse(localStorage.getItem(SITE_DESIGN_KEY) || "{}");
  const root = document.documentElement;

  if(design.theme === "light"){
    root.style.setProperty("--bg", "#f6f4ef");
    root.style.setProperty("--surface", "#ffffff");
    root.style.setProperty("--line", "#d9d4c8");
    root.style.setProperty("--text", "#111111");
    root.style.setProperty("--muted", "#6d6a63");
    root.style.setProperty("--soft", "#333333");
    root.style.colorScheme = "light";
  }

  if(design.accent) root.style.setProperty("--accent", design.accent);
  if(design.backgroundUrl) root.style.setProperty("--bg-image", `url("${design.backgroundUrl}")`);
  if(design.backgroundOpacity) root.style.setProperty("--bg-opacity", design.backgroundOpacity);
}

function setTitle(text){
  document.getElementById("title").innerText = text;
}

function escapeHtml(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function splitTitle(title){
  const text = String(title || "").trim();
  const match = text.match(/^(.*?)\s*(——|—|-)\s*(.+)$/);
  if(!match) return { title:text, subtitle:"" };
  return {
    title:match[1].trim() || text,
    subtitle:match[3].trim()
  };
}

function readMeta(raw){
  const match = String(raw || "").match(/<!--yunhe-meta:([\s\S]*?)-->\s*$/m);
  if(!match) return {};
  try{
    return JSON.parse(match[1]);
  }catch(e){
    return {};
  }
}

function cleanBody(raw){
  return String(raw || "").replace(/\n*<!--yunhe-meta:[\s\S]*?-->\s*$/m, "").trim();
}

function formatDate(value){
  if(!value) return "";
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return value;
  return date.toLocaleString("zh-CN", {
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
    hour:"2-digit",
    minute:"2-digit",
    second:"2-digit",
    hour12:false
  });
}

function findOriginalLink(raw){
  const match = String(raw || "").match(/原文链接[：:]\s*(https?:\/\/\S+)/);
  return match ? match[1].trim() : "";
}

function sourceLabel(meta, raw){
  const link = findOriginalLink(raw);
  const source = String(meta.source || "").trim();
  if(/mp\.weixin\.qq\.com/.test(link)) return "云鹤系统公众号转载";
  return source || "本站撰写";
}

function renderMeta(meta, createdAt, raw){
  const items = [];
  if(meta.originalDate) items.push(`原始撰写时间：${formatDate(meta.originalDate)}`);
  if(createdAt) items.push(`入库时间：${formatDate(createdAt)}`);
  items.push(`来源：${sourceLabel(meta, raw)}`);
  const text = items.join("　/　");
  document.getElementById("meta-top").textContent = text;
  document.getElementById("meta-footer").textContent = text ? `记录信息：${text}` : "";
}

function buildQuery(){
  if(slug) return `slug=eq.${encodeURIComponent(slug)}`;
  if(id) return `id=eq.${encodeURIComponent(id)}`;
  return "";
}

function lineType(line, index){
  if(parseMediaLine(line)) return "media";
  if(index === 0 && /^Case\s+\d+/i.test(line)) return "doc-title";
  if(/^#{1,3}\s+/.test(line)) return "markdown-heading";
  if(SECTION_RE.test(line)) return "section-title";
  if(META_RE.test(line)) return "meta-line";
  if(/^\d+[.、]/.test(line)) return "numbered";
  if(line.length <= 28 && /[:：]$/.test(line)) return "sub-title";
  return "paragraph";
}

function parseMediaLine(line){
  const mediaMatch = line.match(/^\[(image|video|图片|视频)(?::\s*([^\]]+))?\]\((https?:\/\/[^)]+)\)$/i);
  const markdownImage = line.match(/^!\[([^\]]*)\]\((https?:\/\/[^)]+)\)$/i);

  if(mediaMatch){
    const kind = /video|视频/i.test(mediaMatch[1]) ? "video" : "image";
    return {
      kind,
      caption:mediaMatch[2] || "",
      url:mediaMatch[3]
    };
  }

  if(markdownImage){
    const url = markdownImage[2];
    const kind = /\.(mp4|webm|mov)(\?|$)/i.test(url) ? "video" : "image";
    return {
      kind,
      caption:markdownImage[1] || "",
      url
    };
  }

  return null;
}

function parseSourceLink(line){
  return String(line || "").match(/^原文链接[：:]\s*(https?:\/\/\S+)$/);
}

function renderMedia(line){
  const media = parseMediaLine(line);
  if(!media) return "";

  const url = escapeHtml(media.url);
  const caption = escapeHtml(media.caption);
  const captionHtml = caption ? `<figcaption>${caption}</figcaption>` : "";

  if(media.kind === "video"){
    return `<figure class="media-block"><video src="${url}" controls playsinline preload="metadata"></video>${captionHtml}</figure>`;
  }

  return `<figure class="media-block"><img src="${url}" alt="${caption || "文章图片"}" loading="lazy">${captionHtml}</figure>`;
}

function renderBody(raw){
  const lines = String(raw || "")
    .replace(/\r\n/g,"\n")
    .split("\n")
    .map(line => line.trim())
    .filter(Boolean);

  if(!lines.length){
    document.getElementById("body").innerHTML = `<p class="empty">暂无正文。</p>`;
    return;
  }

  document.getElementById("body").innerHTML = lines.map((line, index) => {
    const type = lineType(line, index);
    const sourceMatch = parseSourceLink(line);
    if(sourceMatch){
      const url = escapeHtml(sourceMatch[1]);
      return `<p class="source-link">原文链接：<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a></p>`;
    }

    const safe = escapeHtml(line);

    if(type === "media") return renderMedia(line);

    if(type === "numbered"){
      const match = safe.match(/^(\d+[.、])\s*(.*)$/);
      return `<p class="numbered"><span>${match?.[1] || ""}</span><b>${match?.[2] || safe}</b></p>`;
    }

    if(type === "markdown-heading"){
      const level = (line.match(/^#+/) || [""])[0].length;
      const text = escapeHtml(line.replace(/^#{1,3}\s+/, ""));
      if(level === 1) return `<h2 class="doc-title">${text}</h2>`;
      if(level === 2) return `<h3 class="section-title">${text}</h3>`;
      return `<h4 class="sub-title">${text}</h4>`;
    }

    if(type === "doc-title") return `<h2 class="doc-title">${safe}</h2>`;
    if(type === "section-title") return `<h3 class="section-title">${safe}</h3>`;
    if(type === "sub-title") return `<h4 class="sub-title">${safe}</h4>`;
    if(type === "meta-line") return `<p class="meta-line">${safe}</p>`;
    return `<p class="paragraph">${safe}</p>`;
  }).join("");
}

applyDesign();

const query = buildQuery();

if(!query){
  setTitle("未找到文章");
  throw new Error("missing article id");
}

fetch(`${SUPABASE_URL}/rest/v1/contents?select=title,intro,body,type,topic,created_at&${query}&limit=1`, {
  headers:{
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`
  }
})
.then(res => {
  if(!res.ok) throw new Error("load failed");
  return res.json();
})
.then(data => {
  if(!data || data.length === 0){
    setTitle("文章不存在");
    return;
  }

  const post = data[0];
  const parts = splitTitle(post.title);
  const meta = readMeta(post.body || "");
  const subtitle = meta.subtitle || parts.subtitle || "";
  document.querySelector(".kicker").innerText = `YUNHENODE / ${post.type || "CONTENT"} / ${post.topic || "未分类"}`;
  document.getElementById("title").innerText = parts.title || "无标题";
  document.getElementById("subtitle").innerText = subtitle;
  document.getElementById("intro").innerText = post.intro && post.intro !== subtitle ? post.intro : "";
  const body = cleanBody(post.body || "");
  renderMeta(meta, post.created_at, body);
  renderBody(body);
  renderArticleTools(post);
})
.catch(err => {
  console.error(err);
  setTitle("加载失败");
});

function renderArticleTools(post){
  const tools = document.getElementById("manage-tools");
  const manageParams = new URLSearchParams();
  const contentType = post.type === "case" ? "case" : "article";
  const typeLabel = contentType === "case" ? "案例" : "文章";
  const listUrl = contentType === "case" ? "case-list.html" : "article-list.html";
  const createUrl = contentType === "case" ? "case-write.html" : "publish.html";
  document.getElementById("back-link").href = listUrl;

  if(id) manageParams.set("id", id);
  if(slug) manageParams.set("slug", slug);
  if(post.title) manageParams.set("title", post.title);
  manageParams.set("type", contentType);

  tools.hidden = false;
  tools.innerHTML = `
    <a href="article-manage.html?${manageParams.toString()}">编辑/删除${typeLabel}</a>
    <a href="article-manage.html?type=${contentType}">${typeLabel}管理</a>
    <a href="${createUrl}">新建${typeLabel}</a>
  `;
}
</script>
</body>
</html>
