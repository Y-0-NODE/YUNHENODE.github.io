<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>内容详情</title>

<style>
body { background:#111; color:#fff; font-family:Arial; padding:40px; }
a { color:#fff; }
</style>
</head>

<body>

<a href="article-list.html">← 返回列表</a>

<div id="app">加载中...</div>

<script>
const SUPABASE_URL = "https://ndraugyrdneccqcyfzjt.supabase.co";

const slug = new URLSearchParams(location.search).get("slug");

fetch(`${SUPABASE_URL}/rest/v1/contents?slug=eq.${slug}`)
.then(r => r.json())
.then(data => {
  const item = data[0];

  document.getElementById("app").innerHTML = `
    <h1>${item.title}</h1>
    <p>${item.intro || ""}</p>
    <hr>
    <div>${item.body}</div>
  `;
});
</script>

</body>
</html>
