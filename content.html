<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章详情｜云鹤系统</title>

<style>
body{
  background:#0a0a0a;
  color:#eaeaea;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC";
  padding:40px;
  max-width:900px;
  margin:0 auto;
}

a{
  color:#888;
  text-decoration:none;
}

a:hover{
  color:#fff;
}

h1{
  font-size:34px;
  margin-bottom:10px;
}

#intro{
  color:#777;
  margin-bottom:30px;
  line-height:1.6;
}

#body{
  color:#dcdcdc;
  line-height:1.8;
  font-size:15px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<a href="article-list.html">返回列表</a>

<h1 id="title">加载中...</h1>
<p id="intro"></p>
<div id="body"></div>

<script>
const SUPABASE_URL = "https://ndraugyrdnecqqcyfzjt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM";

const params = new URLSearchParams(location.search);
const slug = params.get("slug");
const id = params.get("id");

function setTitle(text){
  document.getElementById("title").innerText = text;
}

function buildQuery(){
  if(slug) return `slug=eq.${encodeURIComponent(slug)}`;
  if(id) return `id=eq.${encodeURIComponent(id)}`;
  return "";
}

const query = buildQuery();

if(!query){
  setTitle("未找到文章");
  throw new Error("missing article id");
}

fetch(`${SUPABASE_URL}/rest/v1/contents?select=title,intro,body&${query}&limit=1`, {
  headers:{
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`
  }
})
.then(res => {
  if(!res.ok) throw new Error("load failed");
  return res.json();
})
.then(data => {
  if(!data || data.length === 0){
    setTitle("文章不存在");
    return;
  }

  const post = data[0];

  document.getElementById("title").innerText = post.title || "无标题";
  document.getElementById("intro").innerText = post.intro || "";
  document.getElementById("body").innerHTML = post.body || "";
})
.catch(err => {
  console.error(err);
  setTitle("加载失败");
});
</script>

</body>
</html>
