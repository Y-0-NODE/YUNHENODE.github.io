<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>内容管理｜YUNHENODE CMS</title><link rel="stylesheet" href="style.css"><style>
.layout{display:grid;grid-template-columns:330px 1fr;gap:18px;margin-top:30px}.panel{border:1px solid #292929;background:#101010;padding:20px}.panel h2{margin-top:0}.list button{display:block;width:100%;text-align:left;background:#0b0b0b;color:#ddd;border:1px solid #292929;padding:13px;margin:8px 0;cursor:pointer}.list button.active{border-color:#aaa}.muted,.status{color:#999;line-height:1.7}.fields{display:grid;grid-template-columns:1fr 1fr;gap:14px}.fields label{display:block;color:#aaa}.fields input,.fields textarea,.fields select,.login input{width:100%;box-sizing:border-box;background:#090909;color:#eee;border:1px solid #333;padding:11px;margin-top:7px}.fields textarea{min-height:100px}.wide{grid-column:1/-1}.actions{display:flex;flex-wrap:wrap;gap:9px;margin:18px 0}.actions button,.actions a,.login button{border:1px solid #373737;background:#151515;color:#eee;padding:10px 13px;text-decoration:none;cursor:pointer}.danger{color:#ffaaa2!important}.history article{border-top:1px solid #292929;padding:12px 0}@media(max-width:800px){.layout,.fields{grid-template-columns:1fr}.wide{grid-column:auto}}
</style></head><body><header class="topbar"><a class="logo" href="admin.html">YUNHENODE CMS</a><nav><a href="admin.html">后台首页</a><a href="index.html">网站首页</a></nav></header><main class="home"><p class="eyebrow">CONTENT MANAGEMENT</p><h1 id="page-title">内容管理</h1><p class="intro">文章、案例、视频与随笔使用同一组管理能力；媒体文件只保存引用地址，不重复上传。</p>
<section class="panel login"><h2>管理员验证</h2><input id="admin" value="YUNHE" aria-label="管理员名称"><input id="password" type="password" placeholder="管理员密码"><button onclick="loadItems()">进入管理</button><span id="status" class="status"></span></section>
<div class="layout"><aside class="panel"><h2>内容列表</h2><div id="list" class="list muted">验证后读取内容。</div></aside><section class="panel"><h2 id="selected-title">选择一条内容</h2><div class="actions"><a id="edit" href="#">Edit｜编辑</a><button onclick="removeItem()" class="danger">Delete｜删除</button><button onclick="duplicateItem()">Duplicate｜复制</button><button onclick="setLifecycle('archived')">Archive｜归档</button><button onclick="showHistory()">Version History｜历史版本</button></div>
<div class="fields"><label>Publish Settings｜发布设置<select id="lifecycle" onchange="setLifecycle(this.value)"><option value="published">公开发布</option><option value="private">私人</option><option value="archived">归档</option></select></label><label>Metadata｜标题<input id="title"></label><label>主题<input id="topic"></label><label>简介<input id="intro"></label><label>模板<input id="template"></label><label>知识层级<select id="level"><option>Observation</option><option>Analysis</option><option>Decision</option><option>Validation</option><option>Method</option></select></label><label class="wide">正文<textarea id="body"></textarea></label><label class="wide">Collections｜作品集（每行一个）<textarea id="collections"></textarea></label><label class="wide">Related Content｜关联内容 ID（每行一个）<textarea id="related"></textarea></label><label class="wide">Media Files｜媒体文件地址（每行一个）<textarea id="media"></textarea></label></div><div class="actions"><button onclick="saveItem()">保存全部修改</button></div><div id="history" class="history"></div></section></div></main><script>
const TYPE=new URLSearchParams(location.search).get('type')||'article',NAMES={article:'文章',case:'案例',video:'视频',thought:'随笔'};let ITEMS=[],CURRENT=null;
document.getElementById('page-title').textContent=`${NAMES[TYPE]||'内容'}管理`;
const v=id=>document.getElementById(id).value, auth=()=>({adminName:v('admin'),password:v('password')}), lines=id=>v(id).split(/[\n，,]/).map(x=>x.trim()).filter(Boolean);
function meta(body){const m=String(body||'').match(/<!--yunhe-meta:([\s\S]*?)-->\s*$/m);try{return m?JSON.parse(m[1]):{}}catch{return {}}}function clean(body){return String(body||'').replace(/\n*<!--yunhe-meta:[\s\S]*?-->\s*$/m,'').trim()}function esc(s){return String(s||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}
async function call(url,data){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...auth(),...data})});const j=await r.json().catch(()=>({}));if(!r.ok||!j.success)throw Error(j.error||'操作失败');return j}
async function loadItems(){try{const j=await call('./api/admin-list',{type:TYPE});ITEMS=j.data||[];document.getElementById('status').textContent=`已读取 ${ITEMS.length} 条`;renderList()}catch(e){document.getElementById('status').textContent=e.message}}
function renderList(){document.getElementById('list').innerHTML=ITEMS.length?ITEMS.map(x=>`<button onclick="selectItem('${x.id}')"><b>${esc(x.title)}</b><br><small>${esc(x.lifecycle||'published')} · ${esc(x.topic)}</small></button>`).join(''):'暂无内容。'}
function selectItem(id){CURRENT=ITEMS.find(x=>String(x.id)===String(id));if(!CURRENT)return;const m=meta(CURRENT.body);document.getElementById('selected-title').textContent=CURRENT.title;document.getElementById('title').value=CURRENT.title||'';document.getElementById('topic').value=CURRENT.topic||'';document.getElementById('intro').value=CURRENT.intro||'';document.getElementById('body').value=clean(CURRENT.body);document.getElementById('template').value=m.template||'';document.getElementById('level').value=m.knowledge_level||'Observation';document.getElementById('collections').value=(m.collections||[]).join('\n');document.getElementById('related').value=(m.related_documents||[]).join('\n');document.getElementById('media').value=(m.media_files||[]).join('\n');document.getElementById('lifecycle').value=CURRENT.lifecycle||'published';document.getElementById('edit').href=TYPE==='thought'?'thought-manage.html':`article-manage.html?type=${TYPE}&id=${CURRENT.id}`;}
async function saveItem(){if(!CURRENT)return alert('请先选择内容');try{await call('./api/update',{id:CURRENT.id,title:v('title'),topic:v('topic'),intro:v('intro'),body:v('body'),template:v('template'),knowledgeLevel:v('level'),collections:lines('collections'),relatedDocuments:lines('related'),mediaFiles:lines('media')});await loadItems();alert('已保存')}catch(e){alert(e.message)}}
async function setLifecycle(lifecycle){if(!CURRENT)return;try{await call('./api/update',{action:'lifecycle',id:CURRENT.id,lifecycle});await loadItems();alert('发布状态已更新')}catch(e){alert(e.message)}}
async function duplicateItem(){if(!CURRENT)return;const m=meta(CURRENT.body);try{await call('./api/publish',{title:`${CURRENT.title}（副本）`,intro:CURRENT.intro,topic:CURRENT.topic,body:clean(CURRENT.body),type:TYPE,template:m.template,knowledgeLevel:m.knowledge_level,collections:m.collections,relatedDocuments:m.related_documents,mediaFiles:m.media_files});await loadItems();alert('已生成一份新副本')}catch(e){alert(e.message)}}
async function removeItem(){if(!CURRENT||!confirm('确定删除这条内容？'))return;try{await call('./api/delete',{id:CURRENT.id,slug:CURRENT.slug,title:CURRENT.title});CURRENT=null;await loadItems()}catch(e){alert(e.message)}}
async function showHistory(){if(!CURRENT)return;try{const j=await call('./api/backup',{action:'history'}),rows=(j.data||[]).filter(x=>String(x.content_id)===String(CURRENT.id));document.getElementById('history').innerHTML=rows.length?rows.map((x,i)=>`<article>${esc(x.operation)} · ${new Date(x.created_at).toLocaleString()} <button onclick="restore(${i})">恢复</button></article>`).join(''):'没有历史版本';window.HISTORY=rows}catch(e){alert(e.message)}}
async function restore(i){if(!confirm('恢复这个版本？'))return;try{await call('./api/backup',{action:'restore-version',snapshot:HISTORY[i].snapshot});await loadItems();alert('已恢复')}catch(e){alert(e.message)}}
</script></body></html>
