<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公众号接入｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/wechat-connect.css" />
  </head>
  <body>
    <header class="topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (window.history.length > 1) {
            event.preventDefault();
            window.history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="admin.html">后台首页</a>
        <a href="article-manage.html">文章管理</a>
        <a href="index.html">网站首页</a>
      </nav>
    </header>

    <main class="home">
      <p class="eyebrow">WECHAT CONNECT</p>
      <h1>公众号接入</h1>
      <p class="intro">同步公众号“云鹤系统”的图文素材，先进入独立库，再自动归类。</p>

      <section class="panel">
        <label for="admin-name">账户名称</label>
        <input id="admin-name" type="text" value="YUNHE" />

        <label for="admin-password">账户密码</label>
        <input id="admin-password" type="password" />

        <div class="actions">
          <button class="primary" type="button" onclick="syncWechat()">同步公众号文章</button>
          <button type="button" onclick="loadWechat()">刷新列表</button>
        </div>

        <div id="status" class="status">
          需要先在 Vercel 添加 WECHAT_APP_ID 和 WECHAT_APP_SECRET。
        </div>
      </section>

      <section id="list" class="list"></section>
    </main>

    <script src="scripts/pages/wechat-connect.js"></script>
  </body>
</html>
