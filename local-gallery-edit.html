<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>编辑本地作品｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/local-gallery-edit.css" />
  </head>

  <body>
    <header class="topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (window.history.length > 1) {
            event.preventDefault();
            window.history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="photography-manage.html">摄影作品管理</a>
        <a href="admin.html">后台首页</a>
      </nav>
    </header>

    <main class="home">
      <p class="eyebrow">LOCAL MEDIA EDIT</p>
      <h1>编辑本地作品</h1>
      <p class="intro">
        第一次保存会把这件本地作品登记到 Supabase，之后可以直接编辑，不需要下载说明文件。
      </p>

      <section class="panel">
        <div id="preview" class="preview"></div>

        <label for="admin-name">管理员名称</label>
        <input id="admin-name" value="YUNHE" />

        <label for="admin-password">管理员密码</label>
        <input id="admin-password" type="password" />

        <label for="title">作品名称</label>
        <input id="title" type="text" />

        <label for="description">作品介绍</label>
        <textarea id="description"></textarea>

        <label for="shot-at">拍摄日期</label>
        <input id="shot-at" type="date" />

        <label>上传日期</label>
        <div id="created-at" class="readonly">未标注</div>

        <button class="primary" type="button" onclick="saveDirectly()">保存修改</button>
        <a href="photography-manage.html">返回摄影作品管理</a>
        <div id="status" class="status">正在读取作品...</div>
      </section>
    </main>

    <script src="scripts/core/utils.js"></script>
    <script src="scripts/pages/local-gallery-edit.js"></script>
  </body>
</html>
