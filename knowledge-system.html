<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>知识系统｜云鹤系统</title><link rel="stylesheet" href="style.css">
<style>
.shell{max-width:1320px;margin:auto;padding:130px clamp(18px,5vw,64px) 70px}.panel{border:1px solid #292929;background:#101010;padding:20px;margin-top:18px}.hidden{display:none!important}.login{max-width:560px}.layout{display:grid;grid-template-columns:minmax(0,.9fr) minmax(390px,1.1fr);gap:18px}.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.wide{grid-column:1/-1}label{display:block;color:#999;margin:10px 0 7px}input,textarea,select{width:100%;border:1px solid #303030;background:#0b0b0b;color:#eee;padding:11px}textarea{min-height:125px;resize:vertical}button,.button{display:inline-block;border:1px solid #333;background:#151515;color:#eee;padding:10px 14px;cursor:pointer;text-decoration:none}.primary{background:#eee;color:#111;font-weight:700}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:15px}.status,.hint{color:#888;line-height:1.7}.template-list{display:grid;gap:9px;margin-top:12px}.template-row{display:grid;grid-template-columns:64px 150px 1fr auto;gap:8px}.document-list{max-height:300px;overflow:auto;border:1px solid #292929}.document{width:100%;text-align:left;border:0;border-bottom:1px solid #242424;padding:12px;background:#0d0d0d}.document b{display:block}.document small{color:#777}.structure{margin-top:18px}.section-title{font-size:24px;margin:0 0 10px}.counter{display:inline-block;color:#777;margin-left:8px;font-size:14px}@media(max-width:900px){.shell{padding:28px 14px 55px}.layout,.config-grid{grid-template-columns:1fr}.wide{grid-column:auto}.template-row{grid-template-columns:54px 1fr}.template-row .description{grid-column:1/-1}.template-row button{grid-column:1/-1}.document-list{max-height:240px}}
</style>
</head>
<body>
<header class="topbar cms-topbar"><a class="logo logo-back" href="admin.html" onclick="if(history.length>1){event.preventDefault();history.back()}" aria-label="返回上一页">YUNHENODE CMS</a><nav><a href="admin.html">后台</a><a href="search-center.html">搜索中心</a><a href="article-manage.html">文章管理</a></nav></header>
<main class="shell">
<p class="eyebrow">KNOWLEDGE SYSTEM / STRUCTURE</p><h1>知识系统</h1><p class="intro">统一管理 Template、Topic、Knowledge Level、Archive 和 Related Documents。</p>
<section id="login" class="panel login"><label>管理员名称</label><input id="name" value="YUNHE" autocomplete="username"><label>管理员密码</label><input id="password" type="password" autocomplete="current-password"><div class="actions"><button class="primary" onclick="login()">登录知识系统</button></div><div id="login-status" class="status"></div></section>
<section id="dashboard" class="hidden"><div class="layout">
  <div><section class="panel"><h2 class="section-title">Template｜模板管理</h2><p class="hint">保留 A、B、C 等原有模板，可修改名称和说明。</p><div id="templates" class="template-list"></div><div class="actions"><button onclick="addTemplate()">新增模板</button></div></section>
  <section class="panel"><h2 class="section-title">Topic / Level / Archive</h2><div class="config-grid"><div><label>Topic｜主题（每行一个）</label><textarea id="topics"></textarea></div><div><label>Knowledge Level｜知识层级</label><textarea id="levels"></textarea></div><div class="wide"><label>Archive｜档案分类（每行一个）</label><textarea id="archives"></textarea></div><div class="wide"><label>Related Documents｜关联文章规则</label><textarea id="rules"></textarea></div></div><div class="actions"><button class="primary" onclick="saveConfig()">保存知识系统配置</button></div><div id="config-status" class="status"></div></section></div>
  <aside><section class="panel"><h2 class="section-title">内容知识结构 <span id="doc-count" class="counter"></span></h2><input id="doc-query" placeholder="搜索内容" oninput="renderDocs()"><div id="documents" class="document-list"></div><div id="structure" class="structure hidden"><label>内容标题</label><input id="doc-title" readonly><label>Template</label><select id="doc-template"></select><label>Topic</label><select id="doc-topic"></select><label>Knowledge Level</label><select id="doc-level"></select><label>Archive</label><select id="doc-archive"></select><label>Keywords｜关键词</label><textarea id="doc-keywords" placeholder="逗号分隔"></textarea><label>Related Documents｜关联文章 ID</label><textarea id="doc-related" placeholder="每行一个文章 ID"></textarea><div class="actions"><button class="primary" onclick="saveStructure()">保存这篇内容的结构</button><a id="open-doc" class="button" target="_blank">打开内容</a></div><div id="structure-status" class="status"></div></div><p id="structure-empty" class="hint">选择一篇文章或案例后设置知识结构。</p></section></aside>
</div></section>
</main>
<script>
let AUTH={}, CONFIG=null, DOCS=[], CURRENT=null;
const esc=s=>String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
const lines=id=>document.getElementById(id).value.split("\n").map(x=>x.trim()).filter(Boolean);
async function post(url,data){const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...AUTH,...data})}),o=await r.json().catch(()=>({}));if(!r.ok)throw new Error(o.error||"请求失败");return o}
async function login(){AUTH={adminName:document.getElementById("name").value.trim(),password:document.getElementById("password").value};const s=document.getElementById("login-status");s.textContent="正在读取配置与文章…";try{const [c,d]=await Promise.all([post("./api/admin-list",{action:"config-get"}),post("./api/admin-list",{action:"search-index"})]);CONFIG=c.data;DOCS=(d.data||[]).filter(x=>["article","case"].includes(x.type));document.getElementById("login").classList.add("hidden");document.getElementById("dashboard").classList.remove("hidden");fillConfig();renderDocs()}catch(e){s.textContent=e.message}}
function fillConfig(){renderTemplates();document.getElementById("topics").value=(CONFIG.topics||[]).join("\n");document.getElementById("levels").value=(CONFIG.levels||[]).join("\n");document.getElementById("archives").value=(CONFIG.archives||[]).join("\n");document.getElementById("rules").value=(CONFIG.relationRules||[]).join("\n");refreshSelects()}
function renderTemplates(){document.getElementById("templates").innerHTML=(CONFIG.templates||[]).map((t,i)=>`<div class="template-row"><input value="${esc(t.code)}" maxlength="3" onchange="CONFIG.templates[${i}].code=this.value.toUpperCase()"><input value="${esc(t.name)}" onchange="CONFIG.templates[${i}].name=this.value"><input class="description" value="${esc(t.description)}" onchange="CONFIG.templates[${i}].description=this.value"><button onclick="removeTemplate(${i})">删除</button></div>`).join("")}
function addTemplate(){CONFIG.templates.push({code:"X",name:"新模板",description:"请填写用途"});renderTemplates();refreshSelects()}
function removeTemplate(i){if(CONFIG.templates.length<=1)return;CONFIG.templates.splice(i,1);renderTemplates();refreshSelects()}
function currentConfig(){CONFIG.topics=lines("topics");CONFIG.levels=lines("levels");CONFIG.archives=lines("archives");CONFIG.relationRules=lines("rules");return CONFIG}
async function saveConfig(){const s=document.getElementById("config-status");s.textContent="正在保存…";try{const o=await post("./api/admin-list",{action:"config-save",config:currentConfig()});CONFIG=o.data;s.textContent="知识系统配置已保存到 Supabase。";refreshSelects()}catch(e){s.textContent=e.message}}
function renderDocs(){const q=document.getElementById("doc-query").value.toLowerCase();const rows=DOCS.filter(x=>!q||[x.title,x.topic,...(x.keywords||[])].join(" ").toLowerCase().includes(q));document.getElementById("doc-count").textContent=`${rows.length} 条`;document.getElementById("documents").innerHTML=rows.map(x=>`<button class="document" onclick="selectDoc('${x.id}')"><b>${esc(x.title)}</b><small>${esc(x.type)} · ${esc(x.topic)} · ${esc(x.knowledge_level||"未分层")}</small></button>`).join("")||'<p class="status">没有匹配内容。</p>'}
function options(values,current){return (values||[]).map(x=>`<option value="${esc(x)}" ${x===current?"selected":""}>${esc(x)}</option>`).join("")}
function refreshSelects(){if(!CONFIG)return;const t=(CONFIG.templates||[]).map(x=>({value:x.code,label:`${x.code} | ${x.name}`}));const template=document.getElementById("doc-template");template.innerHTML=t.map(x=>`<option value="${esc(x.value)}">${esc(x.label)}</option>`).join("");document.getElementById("doc-topic").innerHTML=options(CONFIG.topics);document.getElementById("doc-level").innerHTML=options(CONFIG.levels);document.getElementById("doc-archive").innerHTML=options(CONFIG.archives);if(CURRENT)populateStructure()}
function selectDoc(id){CURRENT=DOCS.find(x=>String(x.id)===String(id));if(!CURRENT)return;document.getElementById("structure-empty").classList.add("hidden");document.getElementById("structure").classList.remove("hidden");populateStructure()}
function populateStructure(){document.getElementById("doc-title").value=CURRENT.title||"";document.getElementById("doc-template").value=CURRENT.template||"X";document.getElementById("doc-topic").value=CURRENT.topic||"";document.getElementById("doc-level").value=CURRENT.knowledge_level||"Observation";document.getElementById("doc-archive").value=CURRENT.archive||"未分类档案";document.getElementById("doc-keywords").value=(CURRENT.keywords||[]).join("，");document.getElementById("doc-related").value=(CURRENT.related_documents||[]).join("\n");document.getElementById("open-doc").href=`content.html?slug=${encodeURIComponent(CURRENT.slug||"")}`}
async function saveStructure(){if(!CURRENT)return;const s=document.getElementById("structure-status");s.textContent="正在保存…";try{await post("./api/update",{id:CURRENT.id,title:CURRENT.title,intro:CURRENT.intro||"",body:CURRENT.body||"",topic:document.getElementById("doc-topic").value,template:document.getElementById("doc-template").value,knowledgeLevel:document.getElementById("doc-level").value,archive:document.getElementById("doc-archive").value,keywords:document.getElementById("doc-keywords").value.split(/[,，]/).map(x=>x.trim()).filter(Boolean),relatedDocuments:lines("doc-related"),seoTitle:CURRENT.seo_title,seoDescription:CURRENT.seo_description});s.textContent="知识结构已保存。";Object.assign(CURRENT,{topic:document.getElementById("doc-topic").value,template:document.getElementById("doc-template").value,knowledge_level:document.getElementById("doc-level").value,archive:document.getElementById("doc-archive").value,keywords:document.getElementById("doc-keywords").value.split(/[,，]/).map(x=>x.trim()).filter(Boolean),related_documents:lines("doc-related")});renderDocs()}catch(e){s.textContent=e.message}}
</script>
</body></html>
