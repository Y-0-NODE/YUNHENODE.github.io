<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>知识系统｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/knowledge-system.css" />
  </head>
  <body>
    <header class="topbar cms-topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (history.length > 1) {
            event.preventDefault();
            history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="admin.html">后台</a><a href="search-center.html">搜索中心</a
        ><a href="article-manage.html">文章管理</a>
      </nav>
    </header>
    <main class="shell">
      <p class="eyebrow">KNOWLEDGE SYSTEM / STRUCTURE</p>
      <h1>知识系统</h1>
      <p class="intro">统一管理 Template、Topic、Knowledge Level、Archive 和 Related Documents。</p>
      <section id="login" class="panel login">
        <label>管理员名称</label><input id="name" value="YUNHE" autocomplete="username" /><label
          >管理员密码</label
        ><input id="password" type="password" autocomplete="current-password" />
        <div class="actions"><button class="primary" onclick="login()">登录知识系统</button></div>
        <div id="login-status" class="status"></div>
      </section>
      <section id="dashboard" class="hidden">
        <div class="layout">
          <div>
            <section id="templates" class="panel">
              <h2 class="section-title">Method Templates｜模板管理</h2>
              <p class="hint">保留 A、B、C 等原有模板，可修改名称和说明。</p>
              <div id="template-list" class="template-list"></div>
              <div class="actions"><button onclick="addTemplate()">新增模板</button></div>
            </section>
            <section class="panel">
              <h2 class="section-title">Shared Knowledge Structure｜共享知识结构</h2>
              <div class="config-grid">
                <div id="topics">
                  <label>Topic Manager｜主题（每行一个）</label
                  ><textarea id="topic-values"></textarea>
                </div>
                <div id="levels">
                  <label>Knowledge Level｜知识层级</label><textarea id="level-values"></textarea>
                </div>
                <div id="categories">
                  <label>Category Manager｜文章分类</label
                  ><textarea id="category-values"></textarea>
                </div>
                <div id="tags">
                  <label>Tag Manager｜标签体系</label><textarea id="tag-values"></textarea>
                </div>
                <div class="wide">
                  <label>Archive｜档案分类（每行一个）</label><textarea id="archives"></textarea>
                </div>
                <div class="wide">
                  <label>Related Documents｜关联文章规则</label><textarea id="rules"></textarea>
                </div>
              </div>
              <div class="actions">
                <button class="primary" onclick="saveConfig()">保存知识系统配置</button>
              </div>
              <div id="config-status" class="status"></div>
            </section>
          </div>
          <aside>
            <section class="panel">
              <h2 class="section-title">
                内容知识结构 <span id="doc-count" class="counter"></span>
              </h2>
              <input id="doc-query" placeholder="搜索内容" oninput="renderDocs()" />
              <div id="documents" class="document-list"></div>
              <div id="structure" class="structure hidden">
                <label>内容标题</label><input id="doc-title" readonly /><label>Template</label
                ><select id="doc-template"></select
                ><label>Topic</label
                ><select id="doc-topic"></select
                ><label>Knowledge Level</label
                ><select id="doc-level"></select
                ><label>Archive</label
                ><select id="doc-archive"></select
                ><label>Keywords｜关键词</label
                ><textarea id="doc-keywords" placeholder="逗号分隔"></textarea
                ><label>Related Documents｜关联文章 ID</label
                ><textarea id="doc-related" placeholder="每行一个文章 ID"></textarea>
                <div class="actions">
                  <button class="primary" onclick="saveStructure()">保存这篇内容的结构</button
                  ><a id="open-doc" class="button" target="_blank">打开内容</a>
                </div>
                <div id="structure-status" class="status"></div>
              </div>
              <p id="structure-empty" class="hint">选择一篇文章或案例后设置知识结构。</p>
            </section>
          </aside>
        </div>
      </section>
    </main>
    <script src="scripts/pages/knowledge-system.js"></script>
  </body>
</html>
