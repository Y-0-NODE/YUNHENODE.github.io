<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频分类｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <a class="logo logo-back" href="index.html" onclick="if(window.history.length > 1){event.preventDefault();window.history.back();}" aria-label="返回上一页">YUNHENODE</a>
  <nav>
    <a href="index.html">首页</a><a href="article.html">文章</a><a href="case.html">案例</a><a href="video.html">视频</a><a href="thought.html">随笔</a><a href="gallery.html">摄影</a><a href="about.html">关于</a>
  </nav>
</header>

<main class="home">
<p class="eyebrow">VIDEO / CATEGORY</p>
<h1>视频分类</h1>
<p class="intro">按主题查看视频。</p>

<div class="grid" id="category-list"></div>
</main>

<script>
const SUPABASE_URL = "https://ndraugyrdnecqqcyfzjt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM";

async function loadCategories() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/contents?select=id,title,slug,intro,topic,type,created_at&type=eq.video&order=created_at.desc`, {
    headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) throw new Error("视频分类读取失败");
  const videos = await res.json();
  const box = document.getElementById("category-list");
  const topics = [...new Set(videos.map(item => item.topic || "未分类"))];

  box.innerHTML = topics.map(topic => {
    const count = videos.filter(item => item.topic === topic || item.tag === topic).length;
    return `
      <a class="card" href="video-list.html?topic=${encodeURIComponent(topic)}">
        <span>${count} 条</span>
        <h2>${topic}</h2>
        <p>查看${topic}相关视频。</p>
      </a>
    `;
  }).join("");
}
loadCategories().catch(() => {
  document.getElementById("category-list").innerHTML = "<p>视频分类读取失败。</p>";
});
</script>
</body>
</html>
