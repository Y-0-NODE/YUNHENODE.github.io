<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随笔管理｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.manage-shell{
  width:100%;
  max-width:1320px;
  margin:0 auto;
  padding:118px clamp(18px,5vw,72px) 78px;
}

.admin-hero{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:24px;
  align-items:end;
  margin-bottom:30px;
}

.admin-hero h1{
  margin:10px 0 12px;
  font-size:clamp(42px,7vw,96px);
  letter-spacing:0;
  line-height:1;
}

.admin-hero p{
  max-width:780px;
  margin:0;
  color:#bdbdbd;
  font-size:18px;
  line-height:1.75;
}

.panel,
.post-card{
  border:1px solid #292929;
  background:#101010;
}

.profile-chip{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:240px;
  max-width:360px;
  padding:12px;
  border:1px solid #292929;
  background:#101010;
  color:#f2f2f2;
  text-decoration:none;
}

.profile-chip img{
  width:42px;
  height:42px;
  flex:0 0 auto;
  border-radius:50%;
  border:1px solid #333;
  object-fit:cover;
  background:#151515;
}

.profile-chip b{
  display:block;
  font-size:16px;
}

.profile-chip span{
  display:block;
  color:#888;
  font-size:13px;
  line-height:1.5;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  max-width:520px;
}

.login{
  max-width:560px;
  margin-top:32px;
}

.panel{
  padding:22px;
}

label{
  display:block;
  color:#aaa;
  margin:16px 0 8px;
}

input,
textarea,
select{
  width:100%;
  border:1px solid #303030;
  background:#0b0b0b;
  color:#f2f2f2;
  padding:12px;
  border-radius:0;
}

textarea{
  min-height:190px;
  line-height:1.8;
  resize:vertical;
}

.dashboard{
  display:grid;
  grid-template-columns:minmax(0,0.95fr) minmax(360px,0.75fr);
  gap:18px;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.media-tools{
  display:grid;
  gap:12px;
  margin-top:18px;
  padding:16px;
  border:1px solid #292929;
  background:#0d0d0d;
}

.media-tools .two-fields{
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(240px,0.6fr);
  gap:12px;
}

.emoji-row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.emoji-row button{
  min-width:40px;
  padding:7px 9px;
  font-size:18px;
  line-height:1;
}

button,
.button{
  border:1px solid #303030;
  background:#151515;
  color:#f2f2f2;
  padding:10px 14px;
  cursor:pointer;
  text-decoration:none;
}

button.primary{
  background:#f2f2f2;
  color:#0b0b0b;
  font-weight:700;
}

button.danger{
  color:#ff9a9a;
  border-color:#4a2525;
}

.feed{
  display:grid;
  gap:14px;
}

.post-card{
  position:relative;
  padding:18px;
}

.post-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  color:#777;
  font-size:13px;
  margin-bottom:12px;
}

.menu{
  position:relative;
}

.menu-panel{
  position:absolute;
  right:0;
  top:34px;
  display:none;
  min-width:150px;
  border:1px solid #303030;
  background:#0b0b0b;
  z-index:3;
}

.menu.open .menu-panel{
  display:grid;
}

.menu-panel button{
  border:0;
  border-bottom:1px solid #242424;
  text-align:left;
}

.post-body{
  white-space:pre-wrap;
  line-height:1.75;
  color:#e5e5e5;
  font-size:15px;
}

.status{
  color:#888;
  margin-top:16px;
  line-height:1.7;
}

.hidden{
  display:none;
}

@media(max-width:860px){
  .manage-shell{
    padding:24px 14px 56px;
  }

  .admin-hero{
    grid-template-columns:1fr;
    margin-bottom:20px;
  }

  .admin-hero h1{
    font-size:46px;
  }

  .admin-hero p{
    font-size:16px;
  }

  .profile-chip{
    width:100%;
    max-width:none;
    min-width:0;
  }

  .dashboard{
    grid-template-columns:1fr;
  }

  .media-tools .two-fields{
    grid-template-columns:1fr;
  }

  textarea{
    min-height:160px;
  }

}
</style>
</head>
<body>
<header class="topbar cms-topbar">
  <a class="logo logo-back" href="admin.html" onclick="if(window.history.length > 1){event.preventDefault();window.history.back();}" aria-label="返回上一页">YUNHENODE CMS</a>
  <nav>
    <a href="thought.html">公开随笔</a>
    <a href="thought-profile.html">账户</a>
    <a href="admin.html">后台</a>
    <a href="index.html">网站首页</a>
  </nav>
</header>

<main class="manage-shell">
  <section class="admin-hero">
    <div>
      <p class="eyebrow">MICRO NOTES ADMIN</p>
      <h1>写随笔</h1>
      <p>像微博一样发布短记录。这里专门写内容和管理已发布随笔，头像、签名放在独立账户页。</p>
    </div>
    <a id="profile-chip" class="profile-chip hidden" href="thought-profile.html" aria-label="进入随笔账户设置">
      <img id="profile-avatar-preview" src="app-icon.svg" alt="头像">
      <span>
        <b id="profile-name-view">云鹤系统</b>
        <span id="profile-signature-view">短记录、即时观察与公开片段。</span>
      </span>
    </a>
  </section>

  <section id="login-panel" class="panel login">
    <label for="admin-name">管理员名称</label>
    <input id="admin-name" value="YUNHE" autocomplete="username">

    <label for="admin-password">管理员密码</label>
    <input id="admin-password" type="password" autocomplete="current-password">

    <div class="actions">
      <button class="primary" type="button" onclick="login()">登录随笔系统</button>
    </div>
    <div id="login-status" class="status"></div>
  </section>

  <section id="dashboard" class="hidden">
    <div class="dashboard">
      <section class="panel">
        <h2 id="composer-title">写随笔</h2>
        <label for="post-body">内容</label>
        <textarea id="post-body" placeholder="写一条短记录。可以直接输入苹果系统表情，也可以上传图片后自动插入。"></textarea>

        <div class="media-tools">
          <div>
            <label for="post-image-file">随笔图片</label>
            <input id="post-image-file" type="file" accept="image/*">
          </div>
          <div class="two-fields">
            <div>
              <label for="post-image-caption">图片说明</label>
              <input id="post-image-caption" placeholder="例如：现场记录、草图、截图">
            </div>
            <div>
              <label for="post-media-url">已有图片 / 视频地址</label>
              <input id="post-media-url" placeholder="https://...">
            </div>
          </div>
          <div class="actions">
            <button type="button" onclick="uploadPostImage()">上传图片并插入</button>
            <button type="button" onclick="insertMediaUrl()">插入已有地址</button>
          </div>
          <div>
            <label>常用表情</label>
            <div class="emoji-row" aria-label="常用表情">
              <button type="button" onclick="insertEmoji('🌿')">🌿</button>
              <button type="button" onclick="insertEmoji('✨')">✨</button>
              <button type="button" onclick="insertEmoji('📍')">📍</button>
              <button type="button" onclick="insertEmoji('📝')">📝</button>
              <button type="button" onclick="insertEmoji('💭')">💭</button>
              <button type="button" onclick="insertEmoji('🖼️')">🖼️</button>
            </div>
          </div>
          <div id="post-media-status" class="status"></div>
        </div>

        <label for="post-visibility">发布模式</label>
        <select id="post-visibility">
          <option value="public">公开</option>
          <option value="private">仅自己可见</option>
        </select>

        <div class="actions">
          <button class="primary" type="button" onclick="savePost()">发布 / 保存</button>
          <button type="button" onclick="clearComposer()">清空</button>
        </div>
        <div id="save-status" class="status"></div>
      </section>

      <section>
        <div id="list-status" class="status">正在读取随笔...</div>
        <div id="feed" class="feed"></div>
      </section>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
let ADMIN_NAME = "";
let ADMIN_PASSWORD = "";
let POSTS = [];
let PROFILE = null;
let EDITING_ID = "";

function escapeHtml(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function formatDate(value){
  const date = new Date(value);
  if(Number.isNaN(date.getTime())) return "";
  return date.toLocaleString("zh-CN", {
    year:"numeric",
    month:"2-digit",
    day:"2-digit",
    hour:"2-digit",
    minute:"2-digit"
  });
}

function makeTitle(text){
  const clean = String(text || "").replace(/\s+/g, " ").trim();
  return clean.slice(0, 24) || "未命名随笔";
}

function parseProfile(row){
  try{
    return JSON.parse(row?.body || "{}");
  }catch(e){
    return {};
  }
}

function formatBytes(bytes){
  if(!bytes && bytes !== 0) return "";
  if(bytes < 1024) return `${bytes} B`;
  if(bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
}

function imageFromFile(file){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      resolve(img);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("图片读取失败"));
    };
    img.src = url;
  });
}

function canvasToBlob(canvas, type, quality){
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if(blob) resolve(blob);
      else reject(new Error("图片压缩失败"));
    }, type, quality);
  });
}

async function compressImage(file, options){
  if(!file.type.startsWith("image/")) return { file, compressed:false };
  const image = await imageFromFile(file);
  const outputType = "image/jpeg";
  let bestBlob = null;

  for(const step of options.steps){
    const scale = Math.min(1, step.maxSize / Math.max(image.width, image.height));
    const width = Math.max(1, Math.round(image.width * scale));
    const height = Math.max(1, Math.round(image.height * scale));
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#0b0b0b";
    ctx.fillRect(0, 0, width, height);
    ctx.drawImage(image, 0, 0, width, height);
    bestBlob = await canvasToBlob(canvas, outputType, step.quality);
    if(bestBlob.size <= options.targetBytes) break;
  }

  const name = `${options.prefix || "image"}-${Date.now()}.jpg`;
  const uploadFile = typeof File === "function"
    ? new File([bestBlob], name, { type:outputType })
    : Object.assign(bestBlob, { name });

  return { file:uploadFile, compressed:true, originalSize:file.size, newSize:bestBlob.size };
}

function insertTextToPost(text){
  const textarea = document.getElementById("post-body");
  const start = textarea.selectionStart || 0;
  const end = textarea.selectionEnd || 0;
  textarea.value = `${textarea.value.slice(0, start)}${text}${textarea.value.slice(end)}`;
  const position = start + text.length;
  textarea.focus();
  textarea.setSelectionRange(position, position);
}

function insertEmoji(emoji){
  insertTextToPost(emoji);
}

async function signedUpload(file, options){
  const signRes = await fetch("./api/media-sign-upload", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminName:ADMIN_NAME,
      password:ADMIN_PASSWORD,
      kind:options.kind || "photo",
      fileName:file.name,
      contentType:file.type || "application/octet-stream"
    })
  });

  const sign = await signRes.json().catch(() => ({}));
  if(!signRes.ok) throw new Error(sign.error || "申请上传通道失败。");

  const client = window.supabase.createClient("https://ndraugyrdnecqqcyfzjt.supabase.co", "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM");
  const uploadResult = await client.storage
    .from(sign.bucket)
    .uploadToSignedUrl(sign.path, sign.token, file);

  if(uploadResult.error) throw new Error(uploadResult.error.message || "上传失败。");

  await fetch("./api/media-record", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminName:ADMIN_NAME,
      password:ADMIN_PASSWORD,
      kind:options.kind || "photo",
      title:options.title || file.name,
      description:options.description || "",
      fileName:file.name,
      path:sign.path,
      url:sign.publicUrl
    })
  }).catch(() => null);

  return sign.publicUrl;
}

async function uploadPostImage(){
  const status = document.getElementById("post-media-status");
  const file = document.getElementById("post-image-file").files[0];
  const caption = document.getElementById("post-image-caption").value.trim() || "随笔图片";

  if(!ADMIN_NAME || !ADMIN_PASSWORD){
    status.textContent = "请先登录随笔系统。";
    return;
  }

  if(!file){
    status.textContent = "请先选择一张图片。";
    return;
  }

  if(!window.supabase){
    status.textContent = "上传组件还没加载好，请刷新页面后再试。";
    return;
  }

  try{
    status.textContent = "正在压缩随笔图片...";
    const image = await compressImage(file, {
      prefix:"thought",
      targetBytes:900 * 1024,
      steps:[
        { maxSize:1800, quality:0.86 },
        { maxSize:1400, quality:0.82 },
        { maxSize:1100, quality:0.78 },
        { maxSize:900, quality:0.72 },
        { maxSize:720, quality:0.68 }
      ]
    });
    status.textContent = `图片已压缩：${formatBytes(image.originalSize)} → ${formatBytes(image.newSize)}，正在上传...`;
    const url = await signedUpload(image.file, {
      kind:"photo",
      title:caption,
      description:"从随笔管理页插入的图片"
    });
    insertTextToPost(`\n\n[图片:${caption}](${url})\n\n`);
    status.textContent = "图片已上传并插入正文。记得点击“发布 / 保存”。";
  }catch(e){
    status.textContent = e.message || "图片上传失败。";
  }
}

function insertMediaUrl(){
  const status = document.getElementById("post-media-status");
  const url = document.getElementById("post-media-url").value.trim();
  const caption = document.getElementById("post-image-caption").value.trim() || "媒体";

  if(!url){
    status.textContent = "请先填写图片或视频地址。";
    return;
  }

  const isVideo = /\.(mp4|mov|webm|m4v)(\?|#|$)/i.test(url);
  insertTextToPost(`\n\n[${isVideo ? "视频" : "图片"}:${caption}](${url})\n\n`);
  status.textContent = "地址已插入正文。记得点击“发布 / 保存”。";
}

async function adminList(type){
  const res = await fetch("/api/admin-list", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ adminName:ADMIN_NAME, password:ADMIN_PASSWORD, type })
  });
  const result = await res.json().catch(() => ({}));
  if(!res.ok) throw new Error(result.error || "读取失败");
  return Array.isArray(result.data) ? result.data : [];
}

async function login(){
  ADMIN_NAME = document.getElementById("admin-name").value.trim();
  ADMIN_PASSWORD = document.getElementById("admin-password").value.trim();

  if(!ADMIN_NAME || !ADMIN_PASSWORD){
    document.getElementById("login-status").textContent = "请填写管理员名称和密码。";
    return;
  }

  document.getElementById("login-status").textContent = "正在登录...";
  try{
    await reloadAll();
    document.getElementById("login-panel").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
    document.getElementById("profile-chip").classList.remove("hidden");
    document.getElementById("login-status").textContent = "";
  }catch(e){
    document.getElementById("login-status").textContent = e.message || "登录失败。";
  }
}

async function reloadAll(){
  const [posts, profiles] = await Promise.all([
    adminList("thought"),
    adminList("thought_profile")
  ]);

  POSTS = posts;
  PROFILE = profiles[0] || null;
  const profile = parseProfile(PROFILE);
  document.getElementById("profile-name-view").textContent = profile.name || "云鹤系统";
  document.getElementById("profile-signature-view").textContent = profile.signature || "短记录、即时观察与公开片段。";
  document.getElementById("profile-avatar-preview").src = profile.avatar || "app-icon.svg";
  renderPosts();
}

function renderPosts(){
  const feed = document.getElementById("feed");
  const status = document.getElementById("list-status");

  if(!POSTS.length){
    status.textContent = "还没有随笔。";
    feed.innerHTML = "";
    return;
  }

  status.textContent = "";
  feed.innerHTML = POSTS.map(item => `
    <article class="post-card">
      <div class="post-head">
        <span>${item.topic === "private" ? "仅自己可见" : "公开"} / ${formatDate(item.created_at)}</span>
        <div class="menu">
          <button type="button" onclick="toggleMenu(this)">⌄</button>
          <div class="menu-panel">
            <button type="button" onclick="editPost('${item.id}')">编辑</button>
            <button type="button" onclick="toggleVisibility('${item.id}')">${item.topic === "private" ? "设为公开" : "设为仅自己可见"}</button>
            <button type="button" onclick="deletePost('${item.id}')">删除</button>
          </div>
        </div>
      </div>
      <div class="post-body">${escapeHtml(item.body || "")}</div>
    </article>
  `).join("");
}

function toggleMenu(button){
  document.querySelectorAll(".menu.open").forEach(menu => {
    if(menu !== button.parentElement) menu.classList.remove("open");
  });
  button.parentElement.classList.toggle("open");
}

function clearComposer(){
  EDITING_ID = "";
  document.getElementById("composer-title").textContent = "写随笔";
  document.getElementById("post-body").value = "";
  document.getElementById("post-visibility").value = "public";
  document.getElementById("save-status").textContent = "";
}

function editPost(id){
  const item = POSTS.find(post => String(post.id) === String(id));
  if(!item) return;
  EDITING_ID = String(item.id);
  document.getElementById("composer-title").textContent = "编辑随笔";
  document.getElementById("post-body").value = item.body || "";
  document.getElementById("post-visibility").value = item.topic === "private" ? "private" : "public";
  document.getElementById("post-body").focus();
  window.scrollTo({ top:0, behavior:"smooth" });
}

async function savePost(){
  const body = document.getElementById("post-body").value.trim();
  const visibility = document.getElementById("post-visibility").value;

  if(!body){
    document.getElementById("save-status").textContent = "内容不能为空。";
    return;
  }

  const payload = {
    adminName:ADMIN_NAME,
    password:ADMIN_PASSWORD,
    title:makeTitle(body),
    intro:body.slice(0, 100),
    body,
    topic:visibility
  };

  const url = EDITING_ID ? "/api/update" : "/api/publish";
  const requestBody = EDITING_ID ? { ...payload, id:EDITING_ID } : { ...payload, type:"thought" };

  document.getElementById("save-status").textContent = "正在保存...";
  const res = await fetch(url, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(requestBody)
  });
  const result = await res.json().catch(() => ({}));
  if(!res.ok){
    document.getElementById("save-status").textContent = result.error || "保存失败。";
    return;
  }
  clearComposer();
  await reloadAll();
  document.getElementById("save-status").textContent = "已保存。";
}

async function toggleVisibility(id){
  const item = POSTS.find(post => String(post.id) === String(id));
  if(!item) return;
  const next = item.topic === "private" ? "public" : "private";

  const res = await fetch("/api/update", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      id:item.id,
      title:item.title || makeTitle(item.body),
      intro:item.intro || "",
      body:item.body || "",
      topic:next,
      adminName:ADMIN_NAME,
      password:ADMIN_PASSWORD
    })
  });
  const result = await res.json().catch(() => ({}));
  if(!res.ok){
    alert(result.error || "修改可见性失败。");
    return;
  }
  await reloadAll();
}

async function deletePost(id){
  const item = POSTS.find(post => String(post.id) === String(id));
  if(!item) return;
  if(!confirm("确定删除这条随笔吗？")) return;

  const res = await fetch("/api/delete", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      id:item.id,
      slug:item.slug || "",
      title:item.title || "",
      adminName:ADMIN_NAME,
      password:ADMIN_PASSWORD
    })
  });
  const result = await res.json().catch(() => ({}));
  if(!res.ok){
    alert(result.error || "删除失败。");
    return;
  }
  POSTS = POSTS.filter(post => String(post.id) !== String(id));
  renderPosts();
}
</script>
</body>
</html>
