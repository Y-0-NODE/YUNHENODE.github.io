<script>

function formatBytes(bytes){
  if(!bytes && bytes !== 0) return "";
  if(bytes < 1024) return `${bytes} B`;
  if(bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
}

function imageFromFile(file){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      resolve(img);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("图片读取失败，请换 JPG / PNG / WebP 图片。"));
    };
    img.src = url;
  });
}

function canvasToBlob(canvas, type, quality){
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if(blob) resolve(blob);
      else reject(new Error("图片压缩失败。"));
    }, type, quality);
  });
}

async function compressImageForUpload(file, targetBytes){
  if(!file.type.startsWith("image/")) return { file, changed:false };

  const image = await imageFromFile(file);
  const steps = [
    { maxSize:2200, quality:0.86 },
    { maxSize:1800, quality:0.8 },
    { maxSize:1400, quality:0.72 },
    { maxSize:1100, quality:0.64 },
    { maxSize:900, quality:0.56 },
    { maxSize:720, quality:0.5 },
    { maxSize:560, quality:0.46 },
    { maxSize:420, quality:0.42 }
  ];
  let blob = null;

  for(const step of steps){
    const scale = Math.min(1, step.maxSize / Math.max(image.width, image.height));
    const width = Math.max(1, Math.round(image.width * scale));
    const height = Math.max(1, Math.round(image.height * scale));
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#0b0b0b";
    ctx.fillRect(0, 0, width, height);
    ctx.drawImage(image, 0, 0, width, height);
    blob = await canvasToBlob(canvas, "image/jpeg", step.quality);
    if(blob.size <= targetBytes) break;
  }

  const name = `${file.name.replace(/\.[^.]+$/, "") || "image"}-compressed.jpg`;
  const nextFile = typeof File === "function"
    ? new File([blob], name, { type:"image/jpeg" })
    : Object.assign(blob, { name });

  return {
    file:nextFile,
    changed:true,
    originalSize:file.size,
    newSize:blob.size
  };
}

function fileToDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("图片兜底保存失败。"));
    reader.readAsDataURL(file);
  });
}

async function uploadMedia(){
  const selectedFile = document.getElementById("file").files[0];
  const status = document.getElementById("status");
  const adminName = document.getElementById("admin-name").value.trim();
  const password = document.getElementById("admin-password").value.trim();
  const kind = document.getElementById("kind").value;
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("description").value.trim();
  const externalUrl = document.getElementById("external-url").value.trim();

  if(!selectedFile && !externalUrl){
    alert("请选择文件，或者粘贴一个已有作品地址。");
    return;
  }

  if(!adminName || !password){
    alert("请填写账户名称和密码。");
    return;
  }

  if(!selectedFile && externalUrl){
    status.textContent = "正在把已有作品地址写入作品库...";
    const recordRes = await fetch("./api/media-record", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        adminName,
        password,
        kind,
        title,
        description,
        fileName:externalUrl.split("/").pop() || "external-media",
        path:`external/${Date.now()}`,
        url:externalUrl
      })
    });
    const record = await recordRes.json().catch(() => ({}));
    if(!recordRes.ok){
      const detail = record.detail ? `｜${record.detail}` : "";
      status.textContent = `${record.error || "作品地址保存失败。"}${detail}`;
      return;
    }
    status.textContent = "作品地址已保存，已经进入艺术摄影页面。";
    return;
  }

  if(!window.supabase){
    status.textContent = "上传组件加载失败，请刷新页面，或改用“已有作品地址”。";
    return;
  }

  let file = selectedFile;
  let compressed = null;

  try{
    if(kind === "photo" && selectedFile.type.startsWith("image/")){
      status.textContent = "正在压缩图片...";
      compressed = await compressImageForUpload(selectedFile, 450 * 1024);
      file = compressed.file;
      if(compressed.changed){
        status.textContent = `图片已压缩：${formatBytes(compressed.originalSize)} → ${formatBytes(compressed.newSize)}，正在申请上传通道...`;
      }
    }else{
      status.textContent = "正在申请上传通道...";
    }
  }catch(e){
    status.textContent = e.message || "图片压缩失败。";
    return;
  }

  async function requestSign(uploadFile){
    const signRes = await fetch("./api/media-sign-upload", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        adminName,
        password,
        kind,
        fileName:uploadFile.name,
        contentType:uploadFile.type || "application/octet-stream"
      })
    });

    const sign = await signRes.json().catch(() => ({}));
    if(!signRes.ok) throw new Error(sign.error || "申请上传通道失败。");
    return sign;
  }

  async function uploadWithSign(uploadFile){
    const sign = await requestSign(uploadFile);
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const uploadResult = await client.storage
      .from(sign.bucket)
      .uploadToSignedUrl(sign.path, sign.token, uploadFile);

    if(uploadResult.error){
      const message = uploadResult.error.message || "上传到 Supabase 失败。";
      const error = new Error(message);
      error.sign = sign;
      throw error;
    }

    return sign;
  }

  let sign = null;
  try{
    status.textContent = "正在直传到 Supabase，请不要关闭页面...";
    sign = await uploadWithSign(file);
  }catch(e){
    const isSizeError = /maximum allowed size|exceeded/i.test(e.message || "");
    if(kind !== "photo" || !selectedFile.type.startsWith("image/") || !isSizeError){
      status.textContent = e.message || "上传到 Supabase 失败。";
      return;
    }

    try{
      status.textContent = "Supabase 仍然认为图片过大，正在生成更小版本...";
      compressed = await compressImageForUpload(selectedFile, 180 * 1024);
      file = compressed.file;
      status.textContent = `已生成小图版本：${formatBytes(compressed.originalSize)} → ${formatBytes(compressed.newSize)}，正在重新上传...`;
      sign = await uploadWithSign(file);
    }catch(secondError){
      const tooLarge = /maximum allowed size|exceeded/i.test(secondError.message || "");
      if(!tooLarge){
        status.textContent = secondError.message || "上传到 Supabase 失败。";
        return;
      }

      try{
        status.textContent = "存储桶限制仍然很低，正在生成保底缩略图版本...";
        compressed = await compressImageForUpload(selectedFile, 70 * 1024);
        file = compressed.file;
        status.textContent = `保底版本：${formatBytes(compressed.originalSize)} → ${formatBytes(compressed.newSize)}，正在最后尝试上传...`;
        sign = await uploadWithSign(file);
      }catch(finalError){
        try{
          status.textContent = "Supabase Storage 仍然拒绝图片，正在改用数据库兜底保存...";
          compressed = await compressImageForUpload(selectedFile, 38 * 1024);
          file = compressed.file;
          const inlineUrl = await fileToDataUrl(file);
          sign = {
            path:`inline/photo-${Date.now()}.jpg`,
            publicUrl:inlineUrl
          };
          status.textContent = `已改用兜底图片：${formatBytes(compressed.originalSize)} → ${formatBytes(compressed.newSize)}，正在写入作品库...`;
        }catch(inlineError){
          status.textContent = `${finalError.message || "上传失败。"}。兜底保存也失败：${inlineError.message || "图片处理失败"}。`;
          return;
        }
      }
    }
  }

  /*
  const signRes = await fetch("./api/media-sign-upload", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminName,
      password,
      kind,
      fileName:file.name,
      contentType:file.type || "application/octet-stream"
    })
  });

  const sign = await signRes.json().catch(() => ({}));

  if(!signRes.ok){
    status.textContent = sign.error || "申请上传通道失败。";
    return;
  }

  status.textContent = "正在直传到 Supabase，请不要关闭页面...";
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const uploadResult = await client.storage
    .from(sign.bucket)
    .uploadToSignedUrl(sign.path, sign.token, file);

  if(uploadResult.error){
    status.textContent = uploadResult.error.message || "上传到 Supabase 失败。";
    return;
  }
  */

  status.textContent = "文件已上传，正在写入作品库...";
  const recordRes = await fetch("./api/media-record", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminName,
      password,
      kind,
      title,
      description,
      fileName:file.name,
      path:sign.path,
      url:sign.publicUrl
    })
  });

  const record = await recordRes.json().catch(() => ({}));

  if(!recordRes.ok){
    const detail = record.detail ? `｜${record.detail}` : "";
    status.textContent = `${record.error || "文件已上传，但作品库记录失败。"}${detail}`;
    return;
  }

  status.textContent = "上传成功，作品已经进入艺术摄影页面。";
}
</script>
