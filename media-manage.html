<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品上传｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.panel{
  border:1px solid #2a2a2a;
  background:#111;
  padding:22px;
  margin-top:36px;
}

.panel label{
  display:block;
  color:#aaa;
  margin:16px 0 8px;
}

.panel input,
.panel textarea,
.panel select{
  width:100%;
  border:1px solid #2a2a2a;
  background:#0b0b0b;
  color:#f2f2f2;
  padding:12px;
}

.panel textarea{
  min-height:100px;
}

.panel button{
  margin-top:18px;
  border:1px solid #2a2a2a;
  background:#f2f2f2;
  color:#0b0b0b;
  padding:12px 14px;
  font-weight:700;
  cursor:pointer;
}

.status{
  color:#aaa;
  margin-top:18px;
  line-height:1.7;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE CMS</div>
  <nav>
    <a href="admin.html">后台首页</a>
    <a href="gallery.html">艺术摄影</a>
    <a href="index.html">网站首页</a>
  </nav>
</header>

<main class="home">
  <p class="eyebrow">MEDIA UPLOAD</p>
  <h1>作品上传</h1>
  <p class="intro">上传摄影作品和影像作品到 Supabase Storage，并保存到媒体库。</p>

  <section class="panel">
    <label for="admin-name">账户名称</label>
    <input id="admin-name" type="text" value="YUNHE">

    <label for="admin-password">账户密码</label>
    <input id="admin-password" type="password">

    <label for="kind">类型</label>
    <select id="kind">
      <option value="photo">摄影</option>
      <option value="video">影像</option>
    </select>

    <label for="title">标题</label>
    <input id="title" type="text">

    <label for="description">说明</label>
    <textarea id="description"></textarea>

    <label for="file">文件</label>
    <input id="file" type="file" accept="image/*,video/*">

    <button type="button" onclick="uploadMedia()">上传作品</button>
    <div id="status" class="status">建议先上传压缩后的视频。Vercel 免费接口不适合超大视频，后面可以升级为直传 Supabase。</div>
  </section>
</main>

<script>
function readAsDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadMedia(){
  const file = document.getElementById("file").files[0];
  const status = document.getElementById("status");

  if(!file){
    alert("请选择文件。");
    return;
  }

  status.textContent = "正在读取文件...";

  const dataUrl = await readAsDataUrl(file);

  status.textContent = "正在上传...";

  const res = await fetch("./api/media-upload", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      adminName: document.getElementById("admin-name").value.trim(),
      password: document.getElementById("admin-password").value.trim(),
      kind: document.getElementById("kind").value,
      title: document.getElementById("title").value.trim(),
      description: document.getElementById("description").value.trim(),
      fileName: file.name,
      contentType: file.type,
      dataUrl
    })
  });

  const result = await res.json().catch(() => ({}));

  if(!res.ok){
    status.textContent = result.error || "上传失败。";
    return;
  }

  status.textContent = "上传成功。";
}
</script>

</body>
</html>
