<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>作品上传｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/media-manage.css" />
  </head>

  <body>
    <header class="topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (window.history.length > 1) {
            event.preventDefault();
            window.history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="admin.html">后台首页</a>
        <a href="media-center.html">媒体中心</a>
        <a href="index.html">网站首页</a>
      </nav>
    </header>

    <main class="home">
      <p class="eyebrow">MEDIA UPLOAD</p>
      <h1>作品上传</h1>
      <p class="intro">上传摄影作品和影像作品到 Supabase Storage，并保存到媒体库。</p>

      <section class="panel">
        <label for="admin-name">账户名称</label>
        <input id="admin-name" type="text" value="YUNHE" />

        <label for="admin-password">账户密码</label>
        <input id="admin-password" type="password" />

        <label for="kind">类型</label>
        <select id="kind" onchange="syncPaidMediaOptions()">
          <option value="photo">摄影 / 图片</option>
          <option value="video">视频 / 影像</option>
          <option value="audio">音频 / 录音 / 音乐</option>
          <option value="document">PDF / 文档</option>
          <option value="asset">封面 / 通用素材</option>
        </select>

        <label for="title">标题</label>
        <input id="title" type="text" />

        <label for="description">说明</label>
        <textarea id="description"></textarea>

        <label for="shot-at">拍摄日期</label>
        <input id="shot-at" type="date" />

        <label for="file">文件</label>
        <input id="file" type="file" accept="image/*,video/*,audio/*,application/pdf" />

        <label for="photo-quality">摄影上传质量</label>
        <select id="photo-quality">
          <option value="web-hd">Web HD｜网页高清（推荐）</option>
          <option value="web-standard">Web Standard｜网页标准</option>
        </select>

        <label for="external-url">已有作品地址</label>
        <input
          id="external-url"
          type="url"
          placeholder="视频或图片已经在其他平台时，粘贴 https://..."
        />

        <section id="paid-media-settings" class="paid-settings">
          <p>PAID WORK｜付费作品</p>
          <h2>连接统一付款二维码</h2>
          <label class="paid-switch">
            <input id="paywall-enabled" type="checkbox" />
            开启这件作品的付费窗口
          </label>
          <label for="paywall-price">选择价格</label>
          <select id="paywall-price">
            <option value="9.9">¥9.9</option>
            <option value="19.9">¥19.9</option>
            <option value="29.9">¥29.9</option>
            <option value="59">¥59</option>
            <option value="99">¥99</option>
            <option value="199">¥199</option>
          </select>
          <a href="payment-settings.html" target="_blank">查看统一二维码设置</a>
        </section>

        <button type="button" onclick="uploadMedia()">上传作品</button>
        <div id="status" class="status">
          所有文件只进入 Media Center；内容页使用资源地址引用，不重复上传。
        </div>
        <div class="hint">
          摄影建议使用“网页高清”：最长边约
          3200px，适合大屏浏览。相机原始文件请保留在本地硬盘或云端档案，不建议放进 GitHub。4K
          视频建议放在视频平台或网盘，网站只保存链接。
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts/core/config.js"></script>
    <script src="scripts/pages/media-manage.js?v=20260724-paywall-1"></script>
  </body>
</html>
