<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作品上传｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.panel{
  border:1px solid #2a2a2a;
  background:#111;
  padding:22px;
  margin-top:36px;
}

.panel label{
  display:block;
  color:#aaa;
  margin:16px 0 8px;
}

.panel input,
.panel textarea,
.panel select{
  width:100%;
  border:1px solid #2a2a2a;
  background:#0b0b0b;
  color:#f2f2f2;
  padding:12px;
}

.panel textarea{
  min-height:100px;
}

.panel button{
  margin-top:18px;
  border:1px solid #2a2a2a;
  background:#f2f2f2;
  color:#0b0b0b;
  padding:12px 14px;
  font-weight:700;
  cursor:pointer;
}

.status{
  color:#aaa;
  margin-top:18px;
  line-height:1.7;
}

.hint{
  color:#888;
  line-height:1.7;
  margin-top:16px;
}
</style>
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE CMS</div>
  <nav>
    <a href="admin.html">后台首页</a>
    <a href="gallery.html">艺术摄影</a>
    <a href="index.html">网站首页</a>
  </nav>
</header>

<main class="home">
  <p class="eyebrow">MEDIA UPLOAD</p>
  <h1>作品上传</h1>
  <p class="intro">上传摄影作品和影像作品到 Supabase Storage，并保存到媒体库。</p>

  <section class="panel">
    <label for="admin-name">账户名称</label>
    <input id="admin-name" type="text" value="YUNHE">

    <label for="admin-password">账户密码</label>
    <input id="admin-password" type="password">

    <label for="kind">类型</label>
    <select id="kind">
      <option value="photo">摄影</option>
      <option value="video">影像</option>
    </select>

    <label for="title">标题</label>
    <input id="title" type="text">

    <label for="description">说明</label>
    <textarea id="description"></textarea>

    <label for="file">文件</label>
    <input id="file" type="file" accept="image/*,video/*">

    <button type="button" onclick="uploadMedia()">上传作品</button>
    <div id="status" class="status">现在使用直传 Supabase：大文件不会先经过 Vercel。</div>
    <div class="hint">4K 视频能不能上传，主要看你的 Supabase 存储容量、单文件限制和网络稳定性。建议先用短视频测试。</div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://ndraugyrdnecqqcyfzjt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM";

async function uploadMedia(){
  const file = document.getElementById("file").files[0];
  const status = document.getElementById("status");
  const adminName = document.getElementById("admin-name").value.trim();
  const password = document.getElementById("admin-password").value.trim();
  const kind = document.getElementById("kind").value;
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("description").value.trim();

  if(!file){
    alert("请选择文件。");
    return;
  }

  if(!adminName || !password){
    alert("请填写账户名称和密码。");
    return;
  }

  if(!window.supabase){
    status.textContent = "上传组件加载失败，请刷新页面。";
    return;
  }

  status.textContent = "正在申请上传通道...";
  const signRes = await fetch("./api/media-sign-upload", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminName,
      password,
      kind,
      fileName: file.name,
      contentType: file.type
    })
  });

  const sign = await signRes.json().catch(() => ({}));

  if(!signRes.ok){
    status.textContent = sign.error || "申请上传通道失败。";
    return;
  }

  status.textContent = "正在直传到 Supabase，请不要关闭页面...";
  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const uploadResult = await client.storage
    .from(sign.bucket)
    .uploadToSignedUrl(sign.path, sign.token, file);

  if(uploadResult.error){
    status.textContent = uploadResult.error.message || "上传到 Supabase 失败。";
    return;
  }

  status.textContent = "文件已上传，正在写入作品库...";
  const recordRes = await fetch("./api/media-record", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      adminName,
      password,
      kind,
      title,
      description,
      fileName:file.name,
      path:sign.path,
      url:sign.publicUrl
    })
  });

  const record = await recordRes.json().catch(() => ({}));

  if(!recordRes.ok){
    status.textContent = record.error || "文件已上传，但作品库记录失败。";
    return;
  }

  status.textContent = "上传成功，作品已经进入艺术摄影页面。";
}
</script>

</body>
</html>
