<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>视频｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
    <a href="about.html">关于我</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">VIDEO SYSTEM</p>
<h1>视频系统</h1>
<p class="intro">这里自动显示通过后台发布的内容。</p>

<div id="content-list" class="grid"></div>

</main>

<script>
async function loadContent() {
  const res = await fetch("content-list.json");
  const list = await res.json();

  const box = document.getElementById("content-list");

  box.innerHTML = list.map(item => `
    <a class="card" href="${item.url}">
      <span>${item.tag || "CONTENT"}</span>
      <h2>${item.title}</h2>
      <p>${item.intro}</p>
    </a>
  `).join("");
}

loadContent();
</script>

</body>
</html>
