<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内部日记登录｜云鹤系统</title>
    <meta name="theme-color" content="#0b0b0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="云鹤日记" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="app-icon.svg" />
    <link rel="stylesheet" href="assets/styles/pages/diary-login.css" />
  </head>
  <body>
    <main class="login-card">
      <h1>内部日记登录</h1>
      <p>先登录，再进入撰写页面。账户名称填写 Vercel 环境变量名，例如 YUNHE。</p>

      <label for="admin-name">账户名称</label>
      <input id="admin-name" type="text" autocomplete="username" value="YUNHE" />

      <label for="admin-password">账户密码</label>
      <input id="admin-password" type="password" autocomplete="current-password" />

      <button type="button" onclick="login()">登录并进入日记</button>
      <div id="status" class="status"></div>
      <div class="help">如果刚修改过 Vercel 环境变量，需要重新部署后才会生效。</div>
    </main>

    <script src="scripts/pages/diary-login.js"></script>
  </body>
</html>
