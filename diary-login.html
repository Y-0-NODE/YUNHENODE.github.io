<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内部日记登录｜云鹤系统</title>
<meta name="theme-color" content="#0b0b0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="云鹤日记">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="app-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="app-icon.svg">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
  background:#0b0b0b;
  color:#f2f2f2;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;
}
button,input{font:inherit}
.login-card{
  width:min(460px,100%);
  border:1px solid #2a2a2a;
  background:#111;
  padding:28px;
}
.login-card h1{
  margin:0 0 10px;
  font-size:28px;
}
.login-card p{
  color:#aaa;
  line-height:1.7;
}
.login-card label{
  display:block;
  color:#aaa;
  margin:16px 0 8px;
}
.login-card input{
  width:100%;
  border:1px solid #303030;
  background:#0b0b0b;
  color:#f2f2f2;
  padding:13px;
}
.login-card button{
  width:100%;
  margin-top:18px;
  border:1px solid #303030;
  background:#f2f2f2;
  color:#0b0b0b;
  padding:12px 14px;
  font-weight:700;
  cursor:pointer;
}
.status{
  min-height:24px;
  color:#aaa;
  margin-top:16px;
  line-height:1.6;
}
</style>
</head>
<body>
<main class="login-card">
  <h1>内部日记登录</h1>
  <p>先登录，再进入撰写页面。账户名称填写 Vercel 环境变量名，例如 YUNHE。</p>

  <label for="admin-name">账户名称</label>
  <input id="admin-name" type="text" autocomplete="username" value="YUNHE">

  <label for="admin-password">账户密码</label>
  <input id="admin-password" type="password" autocomplete="current-password">

  <button type="button" onclick="login()">登录并进入日记</button>
  <div id="status" class="status"></div>
</main>

<script>
const SESSION_KEY = "yunhe.diary.session.v1";
const ACCOUNT_KEY = "yunhe.diary.account.v1";

document.getElementById("admin-name").value = localStorage.getItem(ACCOUNT_KEY) || "YUNHE";

async function login(){
  const adminName = document.getElementById("admin-name").value.trim();
  const password = document.getElementById("admin-password").value.trim();
  const status = document.getElementById("status");

  if(!adminName){
    alert("请输入账户名称。");
    return;
  }

  if(!password){
    alert("请输入账户密码。");
    return;
  }

  status.textContent = "正在连接数据库...";

  try{
    const res = await fetch("./api/diary-list", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ adminName, password })
    });

    const result = await res.json().catch(() => ({}));

    if(!res.ok){
      status.textContent = result.error || "登录失败，请检查 Vercel 环境变量和数据库表。";
      return;
    }

    localStorage.setItem(ACCOUNT_KEY, adminName);
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({
      adminName,
      password,
      loginAt:new Date().toISOString()
    }));

    window.location.href = "diary-app.html";
  }catch(err){
    status.textContent = "没有连到云端接口。请用 Vercel 网址打开，不要用本地 file:// 页面。";
  }
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js");
  });
}
</script>
</body>
</html>
