<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>案例｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="video.html">视频</a>
    <a href="article.html">文章</a>
    <a href="case.html">案例</a>
    <a href="about.html">关于我</a>
  </nav>
</header>

<main class="home">

<p class="eyebrow">CASE SYSTEM</p>
<h1>案例系统</h1>
<p class="intro">这里管理真实事件、平台问题、品牌问题与现实结构案例。</p>

<div class="grid">
  <a class="card" href="case-list.html">
    <span>01</span>
    <h2>上传案例</h2>
    <p>进入发布后台，内容类型选择“案例”。</p>
  </a>

  <a class="card" href="#case-list">
    <span>02</span>
    <h2>案例列表</h2>
    <p>查看已经发布的案例。</p>
  </a>

  <a class="card" href="case-category.html">
    <span>03</span>
    <h2>案例分类</h2>
    <p>按平台、品牌、城市、消费等主题整理案例。</p>
  </a>

  <a class="card" href="case-draft.html">
    <span>04</span>
    <h2>案例草稿</h2>
    <p>暂存未整理完成的事件材料。</p>
  </a>
</div>

<hr>

<h2 id="case-list">案例列表</h2>
<div id="content-list" class="grid"></div>

</main>

<script>
async function loadContent() {
  const res = await fetch("content-list.json");
  const list = await res.json();

  const cases = list.filter(item => item.type === "case");
  const box = document.getElementById("content-list");

  if (!cases.length) {
    box.innerHTML = "<p>暂无案例内容。</p>";
    return;
  }

  box.innerHTML = cases.map(item => `
    <a class="card" href="${item.url}">
      <span>${item.topic || item.tag || "CASE"}</span>
      <h2>${item.title}</h2>
      <p>${item.intro}</p>
    </a>
  `).join("");
}

loadContent();
</script>

</body>
</html>
