<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="按主题浏览云鹤系统公开文章。">
<title>文章分类｜云鹤系统</title>
<link rel="stylesheet" href="style.css">
<style>
.category-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
  margin-top:46px;
}

.category-card{
  display:flex;
  min-height:190px;
  flex-direction:column;
  justify-content:space-between;
  border:1px solid #2a2a2a;
  background:#101010;
  color:#f2f2f2;
  padding:22px;
  text-decoration:none;
  transition:border-color .2s ease,transform .2s ease;
}

.category-card:hover,
.category-card:focus-visible{
  border-color:#777;
  transform:translateY(-2px);
  outline:none;
}

.category-card span{
  color:#777;
  font-size:13px;
}

.category-card h2{
  margin:42px 0 8px;
  font-size:clamp(25px,3vw,40px);
}

.category-card p{
  color:#999;
  line-height:1.7;
  margin:0;
}

.status{
  color:#888;
  margin-top:30px;
  line-height:1.8;
}

@media(max-width:960px){
  .category-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
}

@media(max-width:620px){
  .category-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="logo">YUNHENODE</div>
  <nav>
    <a href="visitor.html">访客入口</a>
    <a href="article-list.html">文章</a>
    <a href="article-category.html">分类</a>
    <a href="case-list.html">案例</a>
    <a href="gallery.html">作品</a>
    <a href="about.html">关于</a>
  </nav>
</header>

<main class="home">
  <p class="eyebrow">ARTICLE / CATEGORY</p>
  <h1>文章分类</h1>
  <p class="intro">按研究主题浏览公开文章。</p>
  <div id="status" class="status">正在读取文章分类...</div>
  <section id="category-list" class="category-grid" aria-label="文章分类"></section>
</main>

<script>
const SUPABASE_URL = "https://ndraugyrdnecqqcyfzjt.supabase.co";
const SUPABASE_KEY = "sb_publishable_QWJ-UAB2M1a9OwKcCJAA_w_WdbRHYyM";
const DEFAULT_TOPICS = ["品牌","平台","城市","组织","消费","艺术","空间","梦境"];

function escapeHtml(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

async function loadCategories(){
  const status = document.getElementById("status");
  const box = document.getElementById("category-list");

  try{
    const query = "select=topic&type=eq.article&order=created_at.desc";
    const res = await fetch(`${SUPABASE_URL}/rest/v1/contents?${query}`, {
      headers:{
        apikey:SUPABASE_KEY,
        Authorization:`Bearer ${SUPABASE_KEY}`
      }
    });
    if(!res.ok) throw new Error("load failed");

    const articles = await res.json();
    const counts = new Map();
    (Array.isArray(articles) ? articles : []).forEach(item => {
      const topic = String(item.topic || "未分类").trim() || "未分类";
      counts.set(topic, (counts.get(topic) || 0) + 1);
    });

    const discovered = [...counts.keys()].filter(topic => !DEFAULT_TOPICS.includes(topic));
    const topics = [...DEFAULT_TOPICS, ...discovered];

    box.innerHTML = topics.map(topic => {
      const count = counts.get(topic) || 0;
      return `
        <a class="category-card" href="article-topic.html?topic=${encodeURIComponent(topic)}">
          <span>${count} 篇文章</span>
          <div>
            <h2>${escapeHtml(topic)}</h2>
            <p>查看“${escapeHtml(topic)}”主题文章</p>
          </div>
        </a>
      `;
    }).join("");

    status.textContent = articles.length ? `共读取 ${articles.length} 篇公开文章。` : "目前还没有公开文章，可以先浏览分类结构。";
  }catch(e){
    status.textContent = "文章分类加载失败，请检查 Supabase 配置。";
  }
}

loadCategories();
</script>
</body>
</html>
