<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#eaeaea;
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC";
}

header{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  border-bottom:1px solid #141414;
}

.logo{color:#aaa;font-size:13px;letter-spacing:2px;}

.intro{color:#777;margin-top:10px;}

.grid{

  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-top:40px;
}

.card{
  border:1px solid #151515;
  background:#0a0a0a;
  padding:18px;
  border-radius:10px;

  color:inherit;
  transition:.2s;
}

.card:hover{
  border-color:#2a2a2a;
  transform:translateY(-2px);
}

.card span{
  font-size:12px;
  color:#666;
}

.card h2{
  font-size:15px;
  margin:10px 0;
}

.card p{
  font-size:12px;
  color:#666;
}

hr{
  border:0;
  border-top:1px solid #141414;
  margin:50px 0;
}

.article-body{
  line-height:1.8;
  color:#ddd;
  margin-top:20px;
