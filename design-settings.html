<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设计设置｜云鹤系统</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="assets/styles/pages/design-settings.css" />
  </head>
  <body>
    <header class="topbar">
      <a
        class="logo logo-back"
        href="admin.html"
        onclick="
          if (window.history.length > 1) {
            event.preventDefault();
            window.history.back();
          }
        "
        aria-label="返回上一页"
        >YUNHENODE CMS</a
      >
      <nav>
        <a href="admin.html">后台首页</a>
        <a href="media-manage.html">上传背景图</a>
        <a href="content.html">内容页</a>
      </nav>
    </header>

    <main class="home">
      <p class="eyebrow">DESIGN SETTINGS</p>
      <h1>设计设置</h1>
      <p class="intro">
        保存你的阅读页主题、强调色和背景图。背景图可以先在“作品上传”里上传，再把图片地址贴进来。
      </p>

      <section class="settings">
        <div class="panel">
          <label for="theme">主题</label>
          <select id="theme" onchange="previewDesign()">
            <option value="dark">深色极简</option>
            <option value="light">白色纸面</option>
          </select>

          <label for="accent">强调色</label>
          <input id="accent" type="color" value="#ffffff" oninput="previewDesign()" />

          <label for="background-url">背景图 URL</label>
          <input
            id="background-url"
            placeholder="https://.../image.jpg"
            oninput="previewDesign()"
          />

          <label for="background-opacity">背景图强度</label>
          <input
            id="background-opacity"
            type="range"
            min="0"
            max="0.75"
            step="0.05"
            value="0.18"
            oninput="previewDesign()"
          />

          <div class="actions">
            <button class="primary" type="button" onclick="saveDesign()">保存设计</button>
            <button type="button" onclick="resetDesign()">恢复默认</button>
            <a href="media-manage.html">上传背景图</a>
          </div>

          <div id="status" class="status"></div>
        </div>

        <article id="sample" class="sample">
          <p class="eyebrow">SAMPLE</p>
          <h2>Case 001 / BO H5 Modular Upgrade</h2>
          <p>围绕 H5 模块升级的结构化判断与验证记录。</p>
          <h3>Problem（问题）</h3>
          <p>这里展示一级、二级、正文之间的视觉差异。</p>
        </article>
      </section>
    </main>

    <script src="scripts/pages/design-settings.js"></script>
  </body>
</html>
